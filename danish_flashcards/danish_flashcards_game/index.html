<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb-glosekort</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a class="dsg-home" href="../../index.html" title="Tilbage til spiloversigt">🏠 Oversigt</a>
    <div class="wl-bg" aria-hidden="true">
        <span class="wl-card wl-c1">♠</span>
        <span class="wl-card wl-c2">♥</span>
        <span class="wl-card wl-c3">♦</span>
        <span class="wl-card wl-c4">♣</span>
        <span class="wl-card wl-c5">♥</span>
        <span class="wl-card wl-c6">♠</span>
    </div>
    <div class="app-container">
        <!-- Sidebar showing the list of verbs -->
        <aside class="sidebar">
            <h2>Verb List</h2>
            <ul id="verb-list">
                <!-- Verb items will be populated here dynamically -->
            </ul>
        </aside>

        <!-- Main content showing the card and controls -->
        <section class="main-content">
            <h1 class="wl-title">🐇 Verb-glosekort</h1>
            <div class="scoreboard">
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div class="score-row">
                    <div class="progress-info">
                        <span id="card-number">Card 1 of 1</span>
                        <span id="remaining">Remaining: 0</span>
                    </div>
                    <div class="score-info">
                        <span id="correct-count">Correct: 0</span>
                        <span id="wrong-count">Wrong: 0</span>
                    </div>
                </div>
            </div>

            <div id="review-mode-banner" class="review-mode-banner" style="display:none;">
                <span>🔴 Review Mode — fixing your mistakes</span>
                <button id="exit-review-btn" type="button">Back to full deck</button>
            </div>

            <div class="card-wrapper">
                <!-- Card will be injected here -->
            </div>

            <div class="action-buttons">
                <button id="wrong-btn" class="wrong">Got it wrong</button>
                <button id="right-btn" class="right">Got it right</button>
            </div>

            <div class="restart">
                <button id="restart-btn">Start over</button>
            </div>

            <div class="review-mistakes-wrap">
                <button id="review-mistakes-btn" class="review-mistakes-btn" disabled title="No mistakes yet — keep practicing!">Review Mistakes</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
