<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORBINDEORD // Grid Protocol</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&display=swap');
:root{
  --bg:#02060d; --bg2:#04101c; --grid:#0a3a4a;
  --cyan:#37e2ff; --cyan-dim:#0e7a93; --orange:#ff8a1e; --orange-hot:#ff7a18;
  --text:#cdf3ff; --muted:#5d8aa0; --good:#37e2ff; --bad:#ff8a1e;
  --panel:rgba(6,22,34,.78);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:'Share Tech Mono',monospace;color:var(--text);
  background:var(--bg);min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;padding:18px 12px 60px;
  overflow-x:hidden;
}
.grid-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.grid-bg::before{
  content:"";position:absolute;left:-50%;right:-50%;top:42%;bottom:-60%;
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:46px 46px;
  transform:perspective(340px) rotateX(64deg);
  transform-origin:50% 0;
  animation:flow 1.7s linear infinite;
  opacity:.55;
}
@keyframes flow{to{background-position:0 46px}}
.grid-bg::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 38%,transparent 30%,var(--bg) 78%);
}
.scan{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(transparent 0 2px,rgba(0,0,0,.18) 2px 4px);
  mix-blend-mode:multiply;opacity:.5}
.wrap{position:relative;z-index:2;width:min(640px,96vw)}
h1{font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.18em;
  text-align:center;margin:.2em 0 0;font-size:clamp(1.5rem,6vw,2.5rem);
  color:#eafdff;text-shadow:0 0 8px var(--cyan),0 0 24px var(--cyan-dim);}
h1 .o{color:var(--orange);text-shadow:0 0 10px var(--orange-hot)}
.sub{text-align:center;color:var(--muted);letter-spacing:.32em;font-size:.7rem;
  margin:.35em 0 1.1em;text-transform:uppercase}
.hud{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.chip{border:1px solid var(--cyan-dim);background:var(--panel);border-radius:4px;
  padding:7px 12px;font-size:.74rem;letter-spacing:.12em;min-width:78px;text-align:center;
  box-shadow:inset 0 0 14px rgba(55,226,255,.08)}
.chip b{display:block;font-family:'Orbitron';font-size:1.15rem;color:#eafdff;margin-top:2px}
.chip.score b{color:var(--cyan)} .chip.streak b{color:var(--orange)}
.chip.lives b{color:var(--bad)}
.chip.best b{color:#eafdff}
.panel{background:var(--panel);border:1px solid var(--cyan-dim);border-radius:8px;
  padding:20px 18px;box-shadow:0 0 0 1px rgba(55,226,255,.08),0 8px 40px rgba(0,0,0,.6),
  inset 0 0 30px rgba(55,226,255,.05);backdrop-filter:blur(2px)}
.cat{display:flex;align-items:center;gap:8px;font-size:.7rem;letter-spacing:.2em;
  color:var(--orange);text-transform:uppercase;margin-bottom:14px;flex-wrap:wrap}
.cat::before{content:"";width:8px;height:8px;background:var(--orange);
  box-shadow:0 0 8px var(--orange-hot);transform:rotate(45deg)}
.cat .en{color:var(--muted);letter-spacing:.1em}
.sentence{font-size:clamp(1.05rem,3.6vw,1.35rem);line-height:1.7;margin:6px 0 4px;
  color:#eafdff}
.sentence-row{display:flex;align-items:flex-start;gap:10px;margin:6px 0 4px}
.sentence-row .sentence{margin:0;flex:1}
.speaker{width:36px;height:36px;border-radius:50%;display:inline-grid;place-items:center;
  font-size:1rem;flex:none;cursor:pointer;border:1px solid var(--cyan-dim);
  background:var(--panel);color:var(--cyan);margin-top:.15em;
  box-shadow:0 0 10px rgba(55,226,255,.15);transition:transform .08s,box-shadow .15s,border-color .15s}
.speaker:hover{border-color:var(--cyan);box-shadow:0 0 16px rgba(55,226,255,.35)}
.speaker:active{transform:scale(.92)}
.blank{display:inline-block;min-width:90px;border-bottom:2px solid var(--orange);
  color:var(--orange);text-align:center;padding:0 8px;animation:pulse 1.3s ease-in-out infinite;
  font-weight:bold}
.blank.filled{animation:none;border-bottom-color:var(--cyan);color:var(--cyan);
  text-shadow:0 0 8px var(--cyan)}
@keyframes pulse{50%{opacity:.35}}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
@media(max-width:430px){.opts{grid-template-columns:1fr}}
.opt{cursor:pointer;border:1px solid var(--cyan-dim);background:rgba(8,28,42,.7);
  color:var(--text);font-family:'Share Tech Mono';font-size:.95rem;letter-spacing:.04em;
  padding:13px 12px;border-radius:5px;text-align:left;position:relative;
  transition:transform .08s,box-shadow .15s,border-color .15s,background .15s}
.opt::before{content:"\203A";color:var(--cyan-dim);margin-right:8px}
.opt:hover:not(:disabled){transform:translateX(3px);border-color:var(--cyan);
  box-shadow:0 0 14px rgba(55,226,255,.25);background:rgba(12,40,58,.9)}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--good);color:var(--good);
  box-shadow:0 0 18px rgba(55,226,255,.4);background:rgba(10,34,46,.8)}
.opt.correct::before{content:"\2713"}
.opt.wrong{border-color:var(--bad);color:var(--bad);
  box-shadow:0 0 18px rgba(255,138,30,.35);background:rgba(46,28,8,.8);animation:shake .3s}
.opt.wrong::before{content:"\2717"}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.reveal{margin-top:18px;border-top:1px dashed var(--cyan-dim);padding-top:14px;
  display:none;animation:fade .35s ease}
.reveal.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.reveal .lbl{font-size:.62rem;letter-spacing:.24em;color:var(--orange);text-transform:uppercase}
.reveal .tr{color:#dff6ff;font-size:1rem;margin:3px 0 12px;font-style:italic}
.reveal .note{color:var(--muted);font-size:.86rem;line-height:1.55}
.reveal .note b{color:var(--cyan)}
.btn{margin-top:16px;width:100%;cursor:pointer;border:none;border-radius:5px;
  font-family:'Orbitron';font-weight:700;letter-spacing:.18em;font-size:.92rem;
  padding:14px;color:#02131a;background:var(--cyan);
  text-transform:uppercase;box-shadow:0 0 18px rgba(55,226,255,.4);
  transition:transform .1s,box-shadow .15s;display:none}
.btn.show{display:block}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 26px rgba(55,226,255,.6)}
.btn:active{transform:translateY(0)}
.bar{height:5px;background:rgba(55,226,255,.12);border-radius:3px;overflow:hidden;margin:16px 0 2px}
.bar>i{display:block;height:100%;width:0;background:var(--cyan);
  box-shadow:0 0 10px var(--cyan);transition:width .4s}
.count{text-align:center;color:var(--muted);font-size:.66rem;letter-spacing:.2em;margin-top:6px}
.end{text-align:center;display:none}
.end.show{display:block}
.end h2{font-family:'Orbitron';font-weight:900;letter-spacing:.1em;color:#eafdff;
  text-shadow:0 0 14px var(--cyan);font-size:1.8rem;margin:.2em 0}
.end .big{font-family:'Orbitron';font-size:3rem;color:var(--orange);
  text-shadow:0 0 18px var(--orange-hot);margin:.1em 0}
.end p{color:var(--muted);letter-spacing:.08em;line-height:1.6}
.foot{text-align:center;color:var(--muted);font-size:.6rem;letter-spacing:.22em;
  margin-top:22px;text-transform:uppercase;opacity:.7}
.toast{position:fixed;left:50%;top:26%;transform:translateX(-50%);z-index:50;
  background:var(--panel);border:1px solid var(--cyan);color:var(--cyan);
  font-family:'Orbitron',sans-serif;font-weight:800;letter-spacing:.12em;font-size:1.05rem;
  padding:14px 24px;border-radius:6px;box-shadow:0 0 28px rgba(55,226,255,.55);
  opacity:0;pointer-events:none;white-space:nowrap}
.toast.show{animation:toast 1.7s ease forwards}
@keyframes toast{
  0%{opacity:0;transform:translate(-50%,12px) scale(.9)}
  14%{opacity:1;transform:translate(-50%,0) scale(1.04)}
  22%{transform:translate(-50%,0) scale(1)}
  78%{opacity:1}
  100%{opacity:0;transform:translate(-50%,-16px)}}
.dsg-home{position:fixed;top:14px;right:14px;z-index:999999;display:inline-flex;align-items:center;gap:6px;background:rgba(20,20,30,.62);color:#fff;text-decoration:none;font:700 .85rem 'Segoe UI',system-ui,sans-serif;padding:9px 16px;border-radius:999px;backdrop-filter:blur(4px);box-shadow:0 4px 14px rgba(0,0,0,.25);transition:transform .15s ease,background .15s ease}
.dsg-home:hover{transform:translateY(-2px);background:rgba(20,20,30,.8)}
</style>
</head>
<body>
<a class="dsg-home" href="../index.html" title="Tilbage til spiloversigt">🏠 Oversigt</a>
<div class="grid-bg"></div>
<div class="scan"></div>
<div class="toast" id="toast"></div>
<div class="wrap">
  <h1>FORBIND<span class="o">EORD</span></h1>
  <div class="sub">Grid Protocol &middot; Danske forbindeord</div>
  <div class="hud">
    <div class="chip score">Score<b id="score">0</b></div>
    <div class="chip streak">Streak<b id="streak">0</b></div>
    <div class="chip lives">Energy<b id="lives">6</b></div>
    <div class="chip best">Best<b id="best">0</b></div>
  </div>
  <div class="panel" id="game">
    <div class="cat"><span id="cat">&mdash;</span><span class="en" id="catEn"></span></div>
    <div class="sentence-row">
      <p class="sentence" id="sentence"></p>
      <div id="speakerSlot"></div>
    </div>
    <div class="opts" id="opts"></div>

      <div class="lbl">Overs&aelig;ttelse / Translation</div>
      <div class="tr" id="tr"></div>
      <div class="note" id="note"></div>
    </div>

  </div>

    <h2>SYSTEM RESET</h2>
    <div class="big" id="finalScore">0</div>
    <p id="endMsg"></p>
    <button class="btn show" id="again" style="display:block">Genstart // Restart</button>
  </div>
  <div class="foot">// 359 sekvenser &middot; husk inversion //</div>
</div>
<script>
/* ============================================================
   DATA  -  [category, answer, danish(with {} blank), english, clarification]
   Danish letters are written aa/oe/ae and converted to aa/oe/ae below.
   ============================================================ */
const DATA = [];
function s(cat, ans, da, en, note, lvl){ DATA.push([cat, ans, da, en, note, lvl]); }
// ---- TID ----
s("Tid","foerst","{} stod jeg op, og bagefter lavede jeg kaffe.","First I got up, and afterwards I made coffee.","'foerst' marks the first action in a time sequence (inversion: verb before subject).","A2");
s("Tid","foerst","{} skal vi laese teksten igennem en gang.","First we'll read the text through once.","Opens a sequence of steps in time.","A2");
s("Tid","foerst","Vi taler om planen, men {} skal alle have spist.","We'll talk about the plan, but first everyone must have eaten.","Signals what happens before anything else.","A2");
s("Tid","foerst","{} laerer man reglerne, og saa oever man dem.","First you learn the rules, and then you practise them.","Beginning of an ordered process.","A2");
s("Tid","bagefter","Vi saa filmen, og {} gik vi en tur.","We watched the film, and afterwards we went for a walk.","'bagefter' = afterwards; the next thing in time (inversion).","A2");
s("Tid","bagefter","Spis din mad nu; du kan lege {}.","Eat your food now; you can play afterwards.","Points to a later moment after the current one.","A2");
s("Tid","bagefter","Moedet var langt, og {} var alle traette.","The meeting was long, and afterwards everyone was tired.","Marks the result-moment in time after an event.","A2");
s("Tid","bagefter","Vi laeste op, og {} talte vi om historien.","We read aloud, and afterwards we talked about the story.","Marks what comes next in time.","A2");
s("Tid","derefter","Hun laeste op, og {} stillede vi spoergsmaal.","She read aloud, and then we asked questions.","'derefter' = thereafter / next (inversion follows).","B1");
s("Tid","derefter","Bland melet i, og roer dejen {} godt sammen.","Add the flour, and then stir the dough well.","Next step in an instruction sequence.","B1");
s("Tid","derefter","Foerst kom forretten, og {} kom hovedretten.","First came the starter, and then came the main course.","Connects two events in chronological order.","B1");
s("Tid","derefter","Tag et dybt vejr, og svar {} roligt.","Take a deep breath, and then answer calmly.","Marks the following action.","B1");
s("Tid","derpaa","Han pakkede tasken, og {} forlod han huset.","He packed his bag, and thereupon he left the house.","'derpaa' = thereupon; immediately after (inversion).","B1");
s("Tid","derpaa","Vi underskrev kontrakten, og {} fik vi noeglerne.","We signed the contract, and after that we got the keys.","Marks the immediately following event.","B1");
s("Tid","derpaa","Lyset blinkede, og {} gik stroemmen.","The light flickered, and thereupon the power went out.","Sequential, slightly formal time link.","B1");
s("Tid","derpaa","Hun taendte lyset, og {} satte hun sig ned.","She turned on the light, and thereupon she sat down.","Marks the next immediate step.","B1");
s("Tid","dernaest","Foerst praesenterer jeg tallene; {} forklarer jeg dem.","First I present the figures; next I explain them.","'dernaest' = next in a sequence (inversion).","B1");
s("Tid","dernaest","Vi besoegte museet, og {} tog vi til parken.","We visited the museum, and next we went to the park.","Marks the following item in an itinerary.","B1");
s("Tid","dernaest","Skaer groentsagerne, og {} koger du dem.","Cut the vegetables, and next you boil them.","Step-by-step ordering.","B1");
s("Tid","dernaest","Vi maaler braettet, og {} saver vi det.","We measure the board, and next we saw it.","Next step in a procedure.","B1");
s("Tid","saa","Jeg vaagnede, og {} tog jeg et bad.","I woke up, and then I took a shower.","'saa' = then; the next thing in time (inversion).","A1");
s("Tid","saa","Vi spiste, og {} saa vi fjernsyn.","We ate, and then we watched television.","Common everyday sequencer.","A1");
s("Tid","saa","Laes spoergsmaalet, og {} svarer du.","Read the question, and then you answer.","Links action and the following action.","A1");
s("Tid","saa","Tael til tre, og {} springer vi.","Count to three, and then we jump.","Marks the next moment in time.","A1");
s("Tid","kort efter","Toget koerte, og {} begyndte det at regne.","The train left, and shortly after it began to rain.","'kort efter' = shortly afterwards (inversion).","B1");
s("Tid","kort efter","Hun ringede, og {} stod hun ved doeren.","She called, and shortly after she was at the door.","A short interval after the previous event.","B1");
s("Tid","kort efter","Doeren smaekkede, og {} hoerte vi skridt.","The door slammed, and shortly after we heard footsteps.","A short time after an event.","B1");
s("Tid","senere","Vi ses i morgen, og vi taler {} om detaljerne.","See you tomorrow, and we'll talk later about the details.","'senere' = later; a less-defined future point.","A2");
s("Tid","senere","Han startede stille, men {} blev han chef.","He started quietly, but later he became the boss.","A point further ahead in time.","A2");
s("Tid","senere","Gem dokumentet, saa kan du aabne det {}.","Save the document so you can open it later.","Refers to a future moment.","A2");
s("Tid","senere","Vi maa tales ved {} paa ugen.","We'll talk later in the week.","A later, unspecified time.","A2");
s("Tid","til sidst","Vi proevede laenge, og {} lykkedes det.","We tried for a long time, and in the end it worked.","'til sidst' = finally/at last in a time sequence (inversion).","B1");
s("Tid","til sidst","Foerst var hun nervoes, men {} slappede hun af.","At first she was nervous, but in the end she relaxed.","Closes a temporal sequence.","B1");
s("Tid","til sidst","Vi ryddede op, og {} laaste vi doeren.","We tidied up, and finally we locked the door.","The last action in a series of events.","B1");
s("Tid","til sidst","Han tvivlede laenge, men {} sagde han ja.","He doubted for a long time, but in the end he said yes.","Marks the final outcome in time.","B1");
s("Tid","foer","Jeg kendte hende ikke {}, men nu er vi venner.","I didn't know her before, but now we are friends.","'foer' = before/earlier (contrasts with the present).","A2");
s("Tid","foer","Vask haender {} du spiser.","Wash your hands before you eat.","Marks an earlier point in time.","A2");
s("Tid","foer","Han har boet her {}, saa han kender byen.","He has lived here before, so he knows the city.","Refers to an earlier period.","A2");
s("Tid","foer","Tjek spejlet {} du skifter vognbane.","Check the mirror before you change lanes.","An earlier point relative to an action.","A2");
s("Tid","tidligere","{} tog vi toget, men nu cykler vi.","Earlier we took the train, but now we cycle.","'tidligere' = earlier/previously (inversion).","A2");
s("Tid","tidligere","Som naevnt {} er sagen kompliceret.","As mentioned earlier, the matter is complicated.","Points back to a prior moment.","A2");
s("Tid","tidligere","Hun arbejdede {} som laerer.","She previously worked as a teacher.","An earlier period of time.","A2");
s("Tid","tidligere","Butikken aabnede {} end normalt i dag.","The shop opened earlier than usual today.","Marks a point further back in time.","A2");
s("Tid","nu","Foer var jeg i tvivl, men {} er jeg sikker.","Before I was unsure, but now I am certain.","'nu' = now; the present moment (inversion).","A1");
s("Tid","nu","Vi har ventet laenge; {} er det vores tur.","We've waited a long time; now it's our turn.","Marks the current moment.","A1");
s("Tid","nu","{} forstaar jeg, hvad du mener.","Now I understand what you mean.","The present, often after a change.","A1");
s("Tid","nu","Foer boede de i byen; {} bor de paa landet.","Before they lived in the city; now they live in the countryside.","Contrasts the present with the past.","A1");
s("Tid","i dag","I gaar regnede det, men {} skinner solen.","Yesterday it rained, but today the sun is shining.","'i dag' = today (inversion).","A1");
s("Tid","i dag","{} er det fredag, og vi holder fri.","Today it's Friday, and we have the day off.","Refers to the present day.","A1");
s("Tid","i dag","Vi var i skole i gaar, men {} bliver vi hjemme.","We were at school yesterday, but today we stay home.","The current day in contrast to another.","A1");
// ---- RAEKKEFOELGE ----
s("Raekkefoelge","for det foerste","{} er det for dyrt, og for det andet er det grimt.","Firstly it's too expensive, and secondly it's ugly.","'for det foerste' opens a numbered list of reasons (inversion).","B1");
s("Raekkefoelge","for det foerste","Jeg siger nej. {} har jeg ikke tid.","I'm saying no. Firstly, I don't have time.","First point in an argument.","B1");
s("Raekkefoelge","for det foerste","{} skal vi spare penge, og dernaest skal vi planlaegge.","Firstly we must save money, and next we must plan.","Begins an ordered list of points.","B1");
s("Raekkefoelge","for det foerste","{} er kvaliteten god, og for det andet er prisen lav.","Firstly the quality is good, and secondly the price is low.","Opens an enumerated argument.","B1");
s("Raekkefoelge","for det andet","For det foerste er den hurtig, og {} er den billig.","Firstly it's fast, and secondly it's cheap.","'for det andet' = secondly; the second listed point (inversion).","B1");
s("Raekkefoelge","for det andet","Jeg blev hjemme. {} var jeg syg.","I stayed home. Secondly, I was ill.","Second item in a list of reasons.","B1");
s("Raekkefoelge","for det andet","{} boer vi taenke paa miljoeet.","Secondly, we should think about the environment.","Adds the next point in sequence.","B1");
s("Raekkefoelge","for det andet","Pladsen er lille, og {} er den dyr.","The space is small, and secondly it's expensive.","Second listed objection.","B1");
s("Raekkefoelge","endelig","Vi pakkede, vi tjekkede ind, og {} lettede flyet.","We packed, we checked in, and finally the plane took off.","'endelig' = finally; the last item in a sequence (inversion).","B1");
s("Raekkefoelge","endelig","Foerst tre forretter, saa hovedretten, og {} desserten.","First three starters, then the main, and finally dessert.","Closes a list of steps.","B1");
s("Raekkefoelge","endelig","{} vil jeg takke alle for hjaelpen.","Finally, I'd like to thank everyone for their help.","Last point in a structured speech.","B1");
s("Raekkefoelge","endelig","Vi skrev, vi ringede, og {} fik vi svar.","We wrote, we called, and finally we got an answer.","The last step in a sequence.","B1");
s("Raekkefoelge","dels","Han kom for sent {} paa grund af trafikken, dels fordi han sov over sig.","He was late partly because of traffic, partly because he overslept.","'dels ... dels' = partly ... partly; splits a reason in two.","B1");
s("Raekkefoelge","dels","Pengene gaar {} til mad, dels til husleje.","The money goes partly to food, partly to rent.","Divides something into two parts.","B1");
s("Raekkefoelge","dels","Vi rejser {} for at slappe af, dels for at se familie.","We travel partly to relax, partly to see family.","Pairs two coordinated parts.","B1");
s("Raekkefoelge","dels","Beslutningen var svaer {} af oekonomiske, dels af personlige grunde.","The decision was hard partly for financial, partly for personal reasons.","Splits a cause into two halves.","B1");
s("Raekkefoelge","foerst og fremmest","{} handler det om sikkerhed, ikke om penge.","First and foremost it's about safety, not money.","'foerst og fremmest' = above all; the most important thing (inversion).","B1");
s("Raekkefoelge","foerst og fremmest","Vi mangler tid, men {} mangler vi folk.","We lack time, but above all we lack people.","Stresses the primary point.","B1");
s("Raekkefoelge","foerst og fremmest","{} skal du huske at traekke vejret roligt.","First and foremost, remember to breathe calmly.","Marks the top priority.","B1");
s("Raekkefoelge","foerst og fremmest","{} er det et spoergsmaal om tillid.","First and foremost it's a question of trust.","Foregrounds the main issue.","B1");
s("Raekkefoelge","samtidig","Hun lavede mad og {} hjalp hun boernene med lektier.","She cooked and at the same time helped the kids with homework.","'samtidig' = at the same time; two things happen together (inversion).","B1");
s("Raekkefoelge","samtidig","Han talte i telefon, og {} skrev han en mail.","He was on the phone, and at the same time wrote an email.","Marks simultaneity of two actions.","B1");
s("Raekkefoelge","samtidig","Vi sparede penge, og {} fik vi det bedre produkt.","We saved money, and at the same time got the better product.","Two outcomes occurring together.","B1");
// ---- TILFOEJELSE ----
s("Tilfoejelse","ogsaa","Hun spiller klaver, og hun synger {}.","She plays the piano, and she sings too.","'ogsaa' = also/too; adds another point.","A2");
s("Tilfoejelse","ogsaa","Vi koebte broed, og vi tog {} lidt ost med.","We bought bread, and we took some cheese too.","Adds an extra item.","A2");
s("Tilfoejelse","ogsaa","Han er dygtig, og han er {} flink.","He is skilled, and he is also kind.","Adds a further quality.","A2");
s("Tilfoejelse","ogsaa","Vi inviterede naboerne, og vennerne kom {}.","We invited the neighbours, and the friends came too.","Adds another party.","A2");
s("Tilfoejelse","heller ikke","Jeg kan ikke svoemme, og jeg kan {} dykke.","I can't swim, and I can't dive either.","'heller ikke' = not ... either; adds a negative point.","A2");
s("Tilfoejelse","heller ikke","Han kom ikke, og han ringede {}.","He didn't come, and he didn't call either.","Adds another negation.","A2");
s("Tilfoejelse","heller ikke","Vi har ikke tid, og vi har {} raad.","We don't have time, and we can't afford it either.","Negative addition.","A2");
s("Tilfoejelse","heller ikke","Hun spiste ikke, og hun drak {}.","She didn't eat, and she didn't drink either.","Adds a further negative.","A2");
s("Tilfoejelse","desuden","Lejligheden er stor, og {} er den billig.","The flat is large, and besides it's cheap.","'desuden' = besides/moreover; adds info (inversion).","B1");
s("Tilfoejelse","desuden","Maden var god, og {} var betjeningen venlig.","The food was good, and besides the service was friendly.","Adds a supporting point.","B1");
s("Tilfoejelse","desuden","Han er erfaren, og {} taler han tre sprog.","He's experienced, and besides he speaks three languages.","Extra reinforcing information.","B1");
s("Tilfoejelse","desuden","Cyklen er hurtig, og {} er den miljoevenlig.","The bike is fast, and besides it's eco-friendly.","Adds a further advantage.","B1");
s("Tilfoejelse","derudover","Kurset er gratis, og {} faar du et bevis.","The course is free, and on top of that you get a certificate.","'derudover' = in addition (inversion).","B2");
s("Tilfoejelse","derudover","Vi tilbyder mad, og {} soerger vi for musik.","We provide food, and in addition we arrange music.","Adds another offering.","B2");
s("Tilfoejelse","derudover","Hun maler, og {} laver hun keramik.","She paints, and in addition she makes ceramics.","Further item beyond the first.","B2");
s("Tilfoejelse","derudover","Vi laver mad, og {} bager vi kage.","We cook, and in addition we bake a cake.","Adds an extra activity.","B2");
s("Tilfoejelse","endvidere","Rapporten er faerdig, og {} er den korrekturlaest.","The report is done, and furthermore it's been proofread.","'endvidere' = furthermore (formal; inversion).","C1");
s("Tilfoejelse","endvidere","Reglerne gaelder for alle, og {} haandhaeves de strengt.","The rules apply to all, and furthermore they're strictly enforced.","Adds a formal extra point.","C1");
s("Tilfoejelse","endvidere","Produktet er testet, og {} er det godkendt.","The product is tested, and furthermore it's approved.","Additional formal information.","C1");
s("Tilfoejelse","endvidere","Ansoegningen er modtaget, og {} er den behandlet.","The application is received, and furthermore it's been processed.","Adds a further formal step.","C1");
s("Tilfoejelse","ydermere","Planen er dyr, og {} er den urealistisk.","The plan is expensive, and what's more it's unrealistic.","'ydermere' = moreover (formal; inversion).","C1");
s("Tilfoejelse","ydermere","Han kom for sent, og {} havde han glemt mappen.","He was late, and moreover he'd forgotten the folder.","Stronger formal addition.","C1");
s("Tilfoejelse","ydermere","Bygningen er gammel, og {} traenger den til renovering.","The building is old, and moreover it needs renovation.","Adds an emphatic point.","C1");
s("Tilfoejelse","ydermere","Forslaget er dyrt, og {} mangler der opbakning.","The proposal is expensive, and moreover it lacks support.","Adds another formal objection.","C1");
s("Tilfoejelse","yderligere","Vi har solgt alt, og {} har vi faaet nye ordrer.","We've sold everything, and additionally we've got new orders.","'yderligere' = additionally / further.","B2");
s("Tilfoejelse","yderligere","Der kommer {} oplysninger i naeste uge.","Further information will come next week.","Marks something extra/more.","B2");
s("Tilfoejelse","yderligere","Bilen skal {} undersoeges af en mekaniker.","The car needs to be further examined by a mechanic.","Indicates an additional amount/step.","B2");
s("Tilfoejelse","ligeledes","Far hjaelper til, og mor goer {}.","Dad helps out, and mum does likewise.","'ligeledes' = likewise; adds in the same way.","B2");
s("Tilfoejelse","ligeledes","De ansatte fik fri, og cheferne {}.","The staff got time off, and the bosses likewise.","Adds a parallel case.","B2");
s("Tilfoejelse","ligeledes","Vi takker vaerterne og {} musikerne.","We thank the hosts and likewise the musicians.","Adds another in the same manner.","B2");
s("Tilfoejelse","ligeledes","Laereren roste eleverne, og rektoren {}.","The teacher praised the pupils, and the principal likewise.","Adds a matching case.","B2");
s("Tilfoejelse","tilmed","Han huskede gaven, og {} havde han pakket den fint ind.","He remembered the gift, and what's more he'd wrapped it nicely.","'tilmed' = even/what's more; an intensifying addition (inversion).","B2");
s("Tilfoejelse","tilmed","Hun bestod proeven, og {} fik hun topkarakter.","She passed the test, and even got top marks.","Adds a surprising extra.","B2");
s("Tilfoejelse","tilmed","Vejret var fint, og {} var stranden tom.","The weather was nice, and on top of that the beach was empty.","Reinforcing, somewhat surprising addition.","B2");
s("Tilfoejelse","tilmed","Han loeste opgaven, og {} hjalp han de andre.","He solved the task, and what's more he helped the others.","Adds an impressive extra.","B2");
s("Tilfoejelse","endda","Han loeb hele vejen, {} i regnen.","He ran the whole way, even in the rain.","'endda' = even; emphasises an extreme added case.","B2");
s("Tilfoejelse","endda","Hun svarede roligt, {} med et smil.","She answered calmly, even with a smile.","Adds an intensifying detail.","B2");
s("Tilfoejelse","endda","Moedet varede laenge, {} laengere end sidst.","The meeting lasted long, even longer than last time.","Stresses a stronger degree.","B2");
s("Tilfoejelse","endda","Hun arbejdede hele weekenden, {} om soendagen.","She worked all weekend, even on Sunday.","Adds an extreme case.","B2");
s("Tilfoejelse","ovenikoebet","Han tabte spillet, og {} grinede han ad det.","He lost the game, and on top of that he laughed about it.","'ovenikoebet' = on top of that (intensifier; inversion).","B2");
s("Tilfoejelse","ovenikoebet","Maden var billig, og {} smagte den fantastisk.","The food was cheap, and on top of that it tasted amazing.","Adds an emphatic bonus point.","B2");
s("Tilfoejelse","ovenikoebet","Hun kom for sent og var {} uforberedt.","She was late and on top of that unprepared.","Reinforcing, surprising addition.","B2");
s("Tilfoejelse","ovenikoebet","Turen var gratis, og {} fik vi frokost.","The trip was free, and on top of that we got lunch.","Adds a surprising bonus.","B2");
// ---- FORKLARING ----
s("Forklaring","fordi","Jeg blev hjemme, {} jeg var syg.","I stayed home because I was ill.","'fordi' = because; gives the direct cause.","A2");
s("Forklaring","fordi","Hun smilede, {} hun var glad.","She smiled because she was happy.","Introduces the reason.","A2");
s("Forklaring","fordi","Vi tog jakker paa, {} det var koldt.","We put on jackets because it was cold.","States the cause of an action.","A2");
s("Forklaring","fordi","Vi tog paraply med, {} der var meldt regn.","We brought an umbrella because rain was forecast.","Gives the reason for an action.","A2");
s("Forklaring","da","Vi gik indenfor, {} det begyndte at regne.","We went inside, as it started to rain.","'da' = as/since; gives a known reason.","B1");
s("Forklaring","da","Han fik ferie, {} han havde arbejdet haardt.","He got a holiday, as he had worked hard.","Causal 'as', slightly formal.","B1");
s("Forklaring","da","{} bussen var forsinket, kom vi for sent.","As the bus was late, we arrived late.","Reason placed before the result.","B1");
s("Forklaring","da","{} det blev moerkt, taendte vi lyset.","As it got dark, we turned on the lights.","Reason leading the sentence.","B1");
s("Forklaring","eftersom","Vi aflyste turen, {} vejret var daarligt.","We cancelled the trip, since the weather was bad.","'eftersom' = since; introduces a reason.","C1");
s("Forklaring","eftersom","{} alle var enige, vedtog vi planen.","Since everyone agreed, we adopted the plan.","Reason for a decision.","C1");
s("Forklaring","eftersom","Han fik jobbet, {} han var bedst kvalificeret.","He got the job, since he was best qualified.","Explains the basis for an outcome.","C1");
s("Forklaring","eftersom","{} han var syg, blev moedet udskudt.","Since he was ill, the meeting was postponed.","Gives the reason up front.","C1");
s("Forklaring","idet","Hun roedmede, {} hun forstod fejlen.","She blushed, as she realised the mistake.","'idet' = as/in that; reason or simultaneous cause.","C1");
s("Forklaring","idet","Projektet lykkedes, {} alle bidrog.","The project succeeded, in that everyone contributed.","Gives an explanatory reason.","C1");
s("Forklaring","idet","Han vandt, {} de andre lavede fejl.","He won, in that the others made mistakes.","Explains how/why something happened.","C1");
s("Forklaring","for","Tag en paraply med, {} det kommer til at regne.","Take an umbrella, for it's going to rain.","'for' = for; gives a reason (coordinating, no inversion).","A1");
s("Forklaring","for","Vi maa skynde os, {} toget koerer snart.","We must hurry, for the train leaves soon.","Adds a justifying reason.","A1");
s("Forklaring","for","Han var glad, {} han havde bestaaet.","He was happy, for he had passed.","Reason, slightly literary.","A1");
s("Forklaring","for","Luk vinduet, {} det traekker.","Close the window, for there's a draught.","Gives the reason after the request.","A1");
s("Forklaring","nemlig","Hun kom ikke; hun var {} blevet syg.","She didn't come; she had, you see, fallen ill.","'nemlig' = you see/namely; clarifies the precise reason.","B2");
s("Forklaring","nemlig","Vi maatte vente. Bussen var {} forsinket.","We had to wait. The bus was, namely, delayed.","Specifies the explanation.","B2");
s("Forklaring","nemlig","Planen virkede ikke; den var {} for dyr.","The plan didn't work; it was, you see, too expensive.","Pinpoints the reason.","B2");
s("Forklaring","nemlig","Vi vandt; vi havde {} oevet i ugevis.","We won; we had, you see, practised for weeks.","States the underlying reason.","B2");
s("Forklaring","pga.","Kampen blev aflyst {} det daarlige vejr.","The match was cancelled because of the bad weather.","'pga.' = because of (paa grund af); cause as a noun phrase.","B2");
s("Forklaring","pga.","Vejen var lukket {} et uheld.","The road was closed because of an accident.","Gives the cause as a thing.","B2");
s("Forklaring","pga.","Han var traet {} den lange rejse.","He was tired because of the long journey.","Noun-based cause.","B2");
s("Forklaring","pga.","Flyet blev forsinket {} taagen.","The plane was delayed because of the fog.","Cause expressed as a noun.","B2");
// ---- KONSEKVENS ----
s("Konsekvens","saa","Det regnede, {} vi blev hjemme.","It was raining, so we stayed home.","'saa' = so; introduces a consequence.","A1");
s("Konsekvens","saa","Han traenede haardt, {} han vandt.","He trained hard, so he won.","Result of the previous statement.","A1");
s("Konsekvens","saa","Vi var sultne, {} vi lavede mad.","We were hungry, so we cooked.","Everyday consequence link.","A1");
s("Konsekvens","saa","Vejen var glat, {} koerte vi langsomt.","The road was slippery, so we drove slowly.","Marks the resulting action.","A1");
s("Konsekvens","derfor","Toget var aflyst, og {} koerte vi i bil.","The train was cancelled, so therefore we drove.","'derfor' = therefore; states the consequence (inversion).","B2");
s("Konsekvens","derfor","Hun var dygtig, og {} fik hun jobbet.","She was skilled, and therefore she got the job.","Marks a logical result.","B2");
s("Konsekvens","derfor","Det var farligt, og {} stoppede vi.","It was dangerous, and therefore we stopped.","Result of the reason given.","B2");
s("Konsekvens","derfor","Han broed reglerne, og {} blev han diskvalificeret.","He broke the rules, and therefore he was disqualified.","States the consequence.","B2");
s("Konsekvens","dermed","Han scorede, og {} vandt holdet.","He scored, and thereby the team won.","'dermed' = thereby; immediate result (inversion).","B2");
s("Konsekvens","dermed","Vi underskrev, og {} var aftalen gyldig.","We signed, and thereby the agreement was valid.","Marks the direct effect.","B2");
s("Konsekvens","dermed","Hun sagde op, og {} sluttede et kapitel.","She resigned, and thereby a chapter ended.","Consequence that follows directly.","B2");
s("Konsekvens","dermed","Maalet faldt, og {} var kampen afgjort.","The goal was scored, and thereby the match was decided.","Direct outcome of the event.","B2");
s("Konsekvens","saaledes","Reglerne blev aendret, og {} blev alt nemmere.","The rules were changed, and thus everything got easier.","'saaledes' = thus; formal consequence (inversion).","C1");
s("Konsekvens","saaledes","Han forberedte sig, og {} klarede han proeven.","He prepared, and thus he passed the test.","Logical, formal result.","C1");
s("Konsekvens","saaledes","Vi sparede op, og {} kunne vi rejse.","We saved up, and thus we could travel.","Marks the outcome formally.","C1");
s("Konsekvens","saaledes","Vi delte opgaverne, og {} blev arbejdet let.","We shared the tasks, and thus the work became easy.","States the formal result.","C1");
s("Konsekvens","foelgelig","Efterspoergslen steg, og {} steg priserne.","Demand rose, and consequently prices rose.","'foelgelig' = consequently (formal; inversion).","C1");
s("Konsekvens","foelgelig","Beviset manglede, og {} blev sagen droppet.","The evidence was missing, and consequently the case was dropped.","Formal logical consequence.","C1");
s("Konsekvens","foelgelig","Maskinen gik i staa, og {} stoppede produktionen.","The machine stalled, and consequently production stopped.","States the resulting effect.","C1");
s("Konsekvens","foelgelig","Renterne steg, og {} faldt boligpriserne.","Interest rates rose, and consequently house prices fell.","Marks a formal consequence.","C1");
s("Konsekvens","af den grund","Han loej for os, og {} stoler vi ikke paa ham.","He lied to us, and for that reason we don't trust him.","'af den grund' = for that reason (inversion).","C1");
s("Konsekvens","af den grund","Vejret var farligt, og {} aflyste vi turen.","The weather was dangerous, and for that reason we cancelled.","Points back to the stated cause.","C1");
s("Konsekvens","af den grund","Hun var bedst, og {} valgte vi hende.","She was the best, and for that reason we chose her.","Gives the reason for the result.","C1");
s("Konsekvens","af den grund","Han moedte aldrig op, og {} mistede han jobbet.","He never showed up, and for that reason he lost the job.","Links cause to consequence.","C1");
// ---- SAMMENLIGNING ----
s("Sammenligning","baade","Han taler {} engelsk og tysk.","He speaks both English and German.","'baade ... og' = both ... and; positive similarity, two things.","A2");
s("Sammenligning","baade","Vi var {} traette og sultne efter turen.","We were both tired and hungry after the trip.","Joins two equal positives.","A2");
s("Sammenligning","baade","Filmen var {} sjov og spaendende.","The film was both funny and exciting.","Two qualities held together.","A2");
s("Sammenligning","baade","Hun er {} klog og venlig.","She is both clever and kind.","Joins two positive traits.","A2");
s("Sammenligning","begge","De fik {} en praemie for indsatsen.","They both got a prize for the effort.","'begge' = both (two); refers to two together.","B1");
s("Sammenligning","begge","{} forslag er gode, saa det er svaert at vaelge.","Both proposals are good, so it's hard to choose.","Covers the two items equally.","B1");
s("Sammenligning","begge","Vi var {} enige om beslutningen.","We both agreed on the decision.","Two parties in agreement.","B1");
s("Sammenligning","begge","{} hold spillede godt i kampen.","Both teams played well in the match.","Refers to two together.","B1");
s("Sammenligning","alle","{} elever bestod den svaere proeve.","All students passed the difficult test.","'alle' = all; total positive similarity.","A2");
s("Sammenligning","alle","Maden var god, og {} var maette.","The food was good, and everyone was full.","Refers to the whole group alike.","A2");
s("Sammenligning","alle","{} i familien kan lide at rejse.","Everyone in the family likes to travel.","Whole set sharing a trait.","A2");
s("Sammenligning","hverken","Han kunne {} hoere eller se noget.","He could neither hear nor see anything.","'hverken ... eller' = neither ... nor; negative similarity.","B1");
s("Sammenligning","hverken","Vi havde {} tid eller penge til rejsen.","We had neither time nor money for the trip.","Two negatives joined.","B1");
s("Sammenligning","hverken","Hun var {} sur eller glad, bare ligeglad.","She was neither angry nor happy, just indifferent.","Excludes both options.","B1");
s("Sammenligning","hverken","Han ville {} spise eller sove.","He wanted neither to eat nor to sleep.","Negates both alternatives.","B1");
s("Sammenligning","ingen af dem","Jeg spurgte begge drenge, men {} vidste svaret.","I asked both boys, but neither of them knew the answer.","'ingen af dem' = neither/none of them; shared negative.","B1");
s("Sammenligning","ingen af dem","Vi proevede to cafeer, men {} var aabne.","We tried two cafes, but neither was open.","Negates the whole pair.","B1");
s("Sammenligning","ingen af dem","Der var to forslag, men {} duede.","There were two proposals, but neither was any good.","Both fail alike.","B1");
s("Sammenligning","ingen af dem","Vi kontaktede to firmaer, men {} svarede.","We contacted two companies, but neither replied.","Both behave the same way.","B1");
s("Sammenligning","til sammenligning","Danmark er lille; {} er Rusland enormt.","Denmark is small; by comparison Russia is enormous.","'til sammenligning' = by/in comparison (inversion).","B2");
s("Sammenligning","til sammenligning","Vores by har 50.000; {} har hovedstaden millioner.","Our town has 50,000; by comparison the capital has millions.","Sets two figures side by side.","B2");
s("Sammenligning","til sammenligning","Han loeber 5 km; {} loeber hun maraton.","He runs 5 km; by comparison she runs marathons.","Frames a comparison.","B2");
s("Sammenligning","til sammenligning","En myre er lillebitte; {} er en elefant kaempe.","An ant is tiny; by comparison an elephant is huge.","Places two sizes next to each other.","B2");
s("Sammenligning","ligesom","Hun maler smukt, {} sin mor gjorde.","She paints beautifully, just like her mother did.","'ligesom' = just like; marks similarity.","B1");
s("Sammenligning","ligesom","{} sidste aar tager vi til stranden i juli.","Just like last year, we go to the beach in July.","Compares to a parallel case.","B1");
s("Sammenligning","ligesom","Han arbejder haardt, {} de andre paa holdet.","He works hard, just like the others on the team.","States a likeness.","B1");
s("Sammenligning","ligesom","Han synger smukt, {} sin far.","He sings beautifully, just like his father.","Draws a direct parallel.","B1");
// ---- MODSAETNING ----
s("Modsaetning","men","Jeg ville gerne med, {} jeg havde ikke tid.","I'd have liked to come, but I didn't have time.","'men' = but; simple contrast.","A1");
s("Modsaetning","men","Huset er gammelt, {} det er charmerende.","The house is old, but it's charming.","Joins two opposing ideas.","A1");
s("Modsaetning","men","Hun proevede haardt, {} det lykkedes ikke.","She tried hard, but it didn't work.","Marks an opposed result.","A1");
s("Modsaetning","men","Vi ledte overalt, {} vi fandt ikke noeglerne.","We looked everywhere, but we didn't find the keys.","Marks the opposing outcome.","A1");
s("Modsaetning","imidlertid","Planen loed god; {} var den for dyr.","The plan sounded good; however, it was too expensive.","'imidlertid' = however (formal; inversion).","C1");
s("Modsaetning","imidlertid","Han lovede at komme; {} dukkede han aldrig op.","He promised to come; however, he never showed up.","Formal contrast marker.","C1");
s("Modsaetning","imidlertid","Tallene steg; {} faldt overskuddet.","The figures rose; however, the profit fell.","Marks an unexpected opposition.","C1");
s("Modsaetning","imidlertid","Aftalen var klar; {} sprang han fra.","The deal was set; however, he backed out.","Formal, unexpected reversal.","C1");
s("Modsaetning","dog","Det var svaert; vi klarede det {}.","It was hard; we managed it though.","'dog' = however/though; mild contrast.","A2");
s("Modsaetning","dog","Hun er ung; {} er hun meget moden.","She is young; however, she is very mature.","Softens a contrast (inversion when fronted).","A2");
s("Modsaetning","dog","Maden var dyr; den var {} god.","The food was expensive; it was good though.","Concedes an opposing point.","A2");
s("Modsaetning","paa den ene side","{} vil jeg gerne rejse, paa den anden side er det dyrt.","On the one hand I'd like to travel, on the other hand it's expensive.","'paa den ene side' opens a two-sided weighing (inversion).","B2");
s("Modsaetning","paa den ene side","{} er byen livlig, paa den anden side er den larmende.","On the one hand the city is lively, on the other it's noisy.","First side of a balanced view.","B2");
s("Modsaetning","paa den ene side","{} sparer vi tid, paa den anden side koster det mere.","On the one hand we save time, on the other it costs more.","Presents the first of two perspectives.","B2");
s("Modsaetning","paa den ene side","{} er bilen praktisk, paa den anden side forurener den.","On the one hand the car is practical, on the other it pollutes.","Opens a pro-and-con weighing.","B2");
s("Modsaetning","paa den anden side","Det er risikabelt; {} kan det give stort udbytte.","It's risky; on the other hand it could give a big return.","'paa den anden side' = on the other hand (inversion).","B2");
s("Modsaetning","paa den anden side","Jobbet er haardt; {} er loennen god.","The job is hard; on the other hand the pay is good.","Second side of the weighing.","B2");
s("Modsaetning","paa den anden side","Hun er streng; {} er hun retfaerdig.","She is strict; on the other hand she is fair.","Balances the first point.","B2");
s("Modsaetning","paa den anden side","Ferien var dyr; {} var den uforglemmelig.","The holiday was expensive; on the other hand it was unforgettable.","Weighs an upside against a downside.","B2");
s("Modsaetning","mens","Jeg kan lide te, {} min bror foretraekker kaffe.","I like tea, while my brother prefers coffee.","'mens' = while/whereas; contrasts two parties.","A2");
s("Modsaetning","mens","Nogle sparede op, {} andre brugte loes.","Some saved up, while others spent freely.","Sets two behaviours against each other.","A2");
s("Modsaetning","mens","Han er udadvendt, {} hun er stille.","He is outgoing, while she is quiet.","Marks a direct contrast.","A2");
s("Modsaetning","mens","Jeg foretraekker sommer, {} hun elsker vinter.","I prefer summer, while she loves winter.","Contrasts two preferences.","A2");
s("Modsaetning","hvorimod","Katte er selvstaendige, {} hunde soeger selskab.","Cats are independent, whereas dogs seek company.","'hvorimod' = whereas; sharper contrast.","C1");
s("Modsaetning","hvorimod","Han bruger penge, {} hun sparer dem.","He spends money, whereas she saves it.","Strong opposition between two.","C1");
s("Modsaetning","hvorimod","Sommeren er travl, {} vinteren er stille.","Summer is busy, whereas winter is quiet.","Contrasts two situations.","C1");
s("Modsaetning","hvorimod","Byen er hektisk, {} landet er fredeligt.","The city is hectic, whereas the countryside is peaceful.","Sets two places in contrast.","C1");
s("Modsaetning","omvendt","Nogle bliver glade af regn; for mig er det {}.","Some are cheered by rain; for me it's the opposite.","'omvendt' = the other way round / conversely.","B2");
s("Modsaetning","omvendt","Han troede, jeg var sur, men {} var jeg lettet.","He thought I was angry, but conversely I was relieved.","Marks a reversed situation (inversion).","B2");
s("Modsaetning","omvendt","Normalt hjaelper hun mig; i dag var det {}.","Usually she helps me; today it was the other way round.","States a reversal.","B2");
s("Modsaetning","omvendt","Man tror, store hunde er farlige; ofte er det {}.","People think big dogs are dangerous; often it's the opposite.","Marks the reverse of expectation.","B2");
s("Modsaetning","i modsaetning til","{} sin bror er hun meget rolig.","Unlike her brother, she is very calm.","'i modsaetning til' = unlike/in contrast to (inversion).","B2");
s("Modsaetning","i modsaetning til","{} sidste aar blev festen aflyst i aar.","In contrast to last year, the party was cancelled this year.","Contrasts with a named thing.","B2");
s("Modsaetning","i modsaetning til","{} de andre gav han aldrig op.","Unlike the others, he never gave up.","Sets one apart from a group.","B2");
s("Modsaetning","i modsaetning til","{} de fleste kan han lide kulde.","Unlike most people, he likes the cold.","Contrasts one with the majority.","B2");
s("Modsaetning","alligevel","Det regnede, men vi tog {} paa stranden.","It was raining, but we went to the beach anyway.","'alligevel' = anyway/nevertheless; unexpected result.","B1");

/* ============================================================
   BUILD  -  convert ASCII -> proper Danish, group, run game
   ============================================================ */
function dk(t){
  const m=[["Aa","Å"],["Oe","Ø"],["Ae","Æ"],
           ["aa","å"],["oe","ø"],["ae","æ"]];
  for(const [a,b] of m){ t = t.split(a).join(b); }
  return t;
}
const CAT_EN = {
  "Tid":"Time","Raekkefoelge":"Order / sequence","Tilfoejelse":"Addition / new info",
  "Forklaring":"Explanation / cause","Konsekvens":"Consequence","Sammenligning":"Comparison",
  "Modsaetning":"Contrast","Eksempel":"Example","Uddybning":"Clarification",
  "Holdning":"Attitude / stance","Opsummering":"Summary / conclusion"
};
const records = DATA.map(([cat,ans,da,en,note,lvl])=>({
  cat: dk(cat), catEn: CAT_EN[cat], ans: dk(ans), da: dk(da),
  en: en, note: dk(note), lvl: lvl, initial: da.indexOf("{}")===0
}));
const byCat = {};
records.forEach(r=>{ (byCat[r.cat]=byCat[r.cat]||new Set()).add(r.ans); });
Object.keys(byCat).forEach(k=> byCat[k]=Array.from(byCat[k]));
const allAnswers = Array.from(new Set(records.map(r=>r.ans)));

const $ = id => document.getElementById(id);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ---------- SPEECH SYNTHESIS (Danish) ---------- */
let voices = [];
function refreshVoices(){
  if(!('speechSynthesis' in window)) return;
  voices = speechSynthesis.getVoices();
}
function danishVoice(){
  return voices.find(v=>/da(-|_)?DK/i.test(v.lang)) || voices.find(v=>/^da/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = refreshVoices;
  refreshVoices();
}
function speak(text){
  if(!('speechSynthesis' in window) || !text) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "da-DK";
    const v = danishVoice();
    if(v) u.voice = v;
    u.rate = 0.95;
    speechSynthesis.speak(u);
  }catch(e){/* ignore */}
}
function speakerBtn(text, cls){
  const b = document.createElement("button");
  b.className = "speaker " + (cls||"");
  b.type = "button";
  b.textContent = "🔊";
  b.setAttribute("aria-label","Pronounce");
  b.addEventListener("click", e=>{ e.stopPropagation(); speak(text); });
  return b;
}

const LS_KEY = 'forbindenor_v1';

  total:0, correct:0, bestScore:0, bestStreak:0,
  perWord:{}, perCat:{}
});
function loadProgress(){
  try{ const r = JSON.parse(localStorage.getItem(LS_KEY)); return r && r.perWord ? r : defaultProgress(); }
  catch(e){ return defaultProgress(); }
}
function saveProgress(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(P)); }catch(e){} }
let P = loadProgress();

const state = {score:0,streak:0,lives:6,i:0,order:shuffle([...Array(records.length).keys()]),answered:false};

function distractors(rec){
  const pool=(byCat[rec.cat]||[]).filter(w=>w!==rec.ans);
  shuffle(pool);
  let picks=pool.slice(0,3);
  if(picks.length<3){
    const extra=shuffle(allAnswers.filter(w=>w!==rec.ans && picks.indexOf(w)<0));
    picks=picks.concat(extra.slice(0,3-picks.length));
  }
  return picks;
}
function render(){
  state.answered=false;
  const rec=records[state.order[state.i]];
  $('cat').textContent=rec.cat;
  $('catEn').textContent='// '+rec.catEn;
  $('sentence').innerHTML=esc(rec.da).replace('{}','<span class="blank" id="bk">_____</span>');
  const fullSentence=rec.da.replace('{}',rec.initial?cap(rec.ans):rec.ans);
  const slot=$('speakerSlot'); slot.innerHTML='';
  slot.appendChild(speakerBtn(fullSentence));
  const opts=shuffle([rec.ans,...distractors(rec)]);
  const box=$('opts'); box.innerHTML='';
  opts.forEach(w=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=w;
    b.onclick=()=>choose(b,w,rec);
    box.appendChild(b);
  });
  $('reveal').classList.remove('show');
  $('next').classList.remove('show');
  $('tr').textContent=rec.en;
  $('note').innerHTML=esc(rec.note).replace(/'([^']+)'/g,"<b>$1</b>");
  updateHud();
  $('bar').style.width=(state.i/records.length*100)+'%';
  $('count').textContent='Sekvens '+(state.i+1)+' / '+records.length;
}
function choose(btn,w,rec){
  if(state.answered) return;
  state.answered=true;
  const disp=rec.initial?cap(rec.ans):rec.ans;
  const bk=$('bk');
  document.querySelectorAll('.opt').forEach(o=>{
    o.disabled=true;
    if(o.textContent===rec.ans) o.classList.add('correct');
  });
  bk.textContent=disp; bk.classList.add('filled');
  const isCorrect = w===rec.ans;
  if(isCorrect){
    btn.classList.add('correct');
    state.streak++; state.score+=100+Math.min(state.streak,10)*10;
    if(state.streak%5===0){
      if(state.lives<6){ state.lives++; energyPopup('⚡ +1 ENERGY'); }
      else { energyPopup('⚡ ENERGY FULL'); }
    }
  }else{
    btn.classList.add('wrong');
    state.streak=0; state.lives--;
  }
  recordAnswer(rec,isCorrect);
  updateHud();
  $('reveal').classList.add('show');
  if(state.lives<=0){ $('next').textContent='Se resultat »'; }
  $('next').classList.add('show');
}
function recordAnswer(rec,isCorrect){
  P.total++;
  if(isCorrect) P.correct++;
  if(state.streak>P.bestStreak) P.bestStreak=state.streak;
  if(state.score>P.bestScore) P.bestScore=state.score;
  const pw = P.perWord[rec.ans] || (P.perWord[rec.ans]={t:0,c:0});
  pw.t++; if(isCorrect) pw.c++;
  const pc = P.perCat[rec.cat] || (P.perCat[rec.cat]={t:0,c:0});
  pc.t++; if(isCorrect) pc.c++;
  saveProgress();
}
function energyPopup(msg){
  const t=$('toast');
  t.textContent=msg;
  t.classList.remove('show');
  void t.offsetWidth;           // restart the animation
  t.classList.add('show');
}
function updateHud(){
  $('score').textContent=state.score;
  $('streak').textContent=state.streak;
  $('lives').textContent='◆'.repeat(Math.max(state.lives,0))||'—';
  $('best').textContent=Math.max(P.bestScore,state.score);
}
$('next').onclick=()=>{
  if(state.lives<=0) return end(false);
  state.i++;
  if(state.i>=records.length) return end(true);
  render();
};
function end(win){
  $('game').style.display='none';
  $('end').classList.add('show');
  $('finalScore').textContent=state.score;
  $('endMsg').textContent=win
    ? 'Du gennemførte alle '+records.length+' sekvenser. // You cleared the whole grid!'
    : 'Energien er brugt op efter '+(state.i+1)+' sekvenser. // Derezzed — try again.';
}
$('again').onclick=()=>{
  state.score=0;state.streak=0;state.lives=6;state.i=0;
  state.order=shuffle([...Array(records.length).keys()]);
  $('end').classList.remove('show');
  $('game').style.display='block';
  render();
};
render();
</script>
</body>
</html>
