<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Præpositions-Mester · Lær danske præpositioner</title>
<style>
:root{
  --red:#ee1515; --red-d:#c70e0e;
  --blue:#2a75bb; --blue-d:#1b5790;
  --yellow:#ffcb05; --yellow-d:#e0a800;
  --green:#3ec46d; --green-d:#2da559;
  --ink:#243447; --ink-soft:#51637a;
  --bg1:#5fb0f0; --bg2:#3a86d6;
  --card:#ffffff; --line:#e6ecf3;
  --shadow:0 10px 30px rgba(18,40,70,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Trebuchet MS","Segoe UI",system-ui,-apple-system,sans-serif;
  color:var(--ink);
  background:linear-gradient(160deg,var(--bg1),var(--bg2));
  min-height:100vh;
  background-attachment:fixed;
}
.wrap{max-width:680px;margin:0 auto;padding:14px 14px 60px}

/* Header / Pokedex bar */
.dex{
  background:linear-gradient(180deg,var(--red),var(--red-d));
  border-radius:20px;
  padding:14px 16px;
  box-shadow:var(--shadow);
  color:#fff;
  display:flex;align-items:center;gap:14px;
  position:relative;
}
.dexlight{
  width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%,#bfeaff,#3aa0ff 60%,#0b62c9);
  border:3px solid #fff;flex:none;
  box-shadow:0 0 0 3px rgba(255,255,255,.35),0 0 14px #6fc4ff;
  animation:blink 2.4s infinite;
}
@keyframes blink{0%,92%,100%{opacity:1}96%{opacity:.45}}
.dex h1{font-size:1.25rem;margin:0;letter-spacing:.3px;line-height:1.1}
.dex p{margin:2px 0 0;font-size:.78rem;opacity:.92;font-weight:bold}
.minidots{display:flex;gap:6px;margin-left:auto}
.minidots span{width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.7)}
.minidots .r{background:#ff5a5a}.minidots .y{background:var(--yellow)}.minidots .g{background:var(--green)}

/* Progress bar */
.pbar-wrap{margin:14px 2px 6px}
.pbar-top{display:flex;justify-content:space-between;font-size:.78rem;font-weight:bold;color:#fff;margin-bottom:5px;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.pbar{height:16px;background:rgba(255,255,255,.4);border-radius:20px;overflow:hidden;border:2px solid #fff;box-shadow:inset 0 1px 3px rgba(0,0,0,.15)}
.pbar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--yellow),var(--green));border-radius:20px;transition:width .5s cubic-bezier(.4,1.4,.5,1)}

/* Cards */
.card{
  background:var(--card);border-radius:20px;padding:20px;margin-top:14px;
  box-shadow:var(--shadow);animation:fade .35s ease both;
}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* Menu grid */
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.mode-btn{
  border:none;cursor:pointer;border-radius:16px;padding:16px 12px;color:#fff;
  text-align:left;font-family:inherit;
  transition:transform .08s;position:relative;overflow:hidden;
}
.mode-btn:active{transform:translateY(2px)}
.mode-btn .emoji{font-size:1.6rem;display:block;margin-bottom:6px}
.mode-btn .t{font-size:1rem;font-weight:bold;display:block;line-height:1.15}
.mode-btn .d{font-size:.72rem;opacity:.92;display:block;margin-top:3px}
.c-red{background:linear-gradient(160deg,#ff5a5a,var(--red-d))}
.c-blue{background:linear-gradient(160deg,#4a9fe0,var(--blue-d))}
.c-green{background:linear-gradient(160deg,#56d98a,var(--green-d))}
.c-yellow{background:linear-gradient(160deg,#ffd84a,var(--yellow-d));color:#5a4500}
.c-purple{background:linear-gradient(160deg,#a07be8,#6f48c9)}
.c-teal{background:linear-gradient(160deg,#3fd0c9,#1f9a94)}
.c-orange{background:linear-gradient(160deg,#ff9d4a,#e06d12)}
.c-pink{background:linear-gradient(160deg,#ff7eb3,#d6478c)}
.c-slate{background:linear-gradient(160deg,#6b8cae,#43607e)}
.c-gold{background:linear-gradient(160deg,#e8c45a,#b8901f)}

.section-title{color:#fff;font-size:1.05rem;font-weight:bold;margin:18px 4px 2px;text-shadow:0 1px 2px rgba(0,0,0,.2)}

/* Exercise */
.exhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:8px}
.badge{background:var(--blue);color:#fff;font-size:.72rem;font-weight:bold;padding:5px 11px;border-radius:20px}
.badge.theme{background:var(--yellow);color:#5a4500}
.qcount{font-size:.8rem;color:var(--ink-soft);font-weight:bold}
.prompt{font-size:.82rem;color:var(--ink-soft);margin:10px 0 4px;font-weight:bold}
.sentence{font-size:1.5rem;line-height:1.5;margin:12px 0 6px;font-weight:bold}
.sentence .blank{display:inline-block;min-width:74px;border-bottom:4px dotted var(--blue);text-align:center;color:var(--blue);padding:0 6px}
.sentence .filled{color:var(--green)}
.sentence .word{cursor:pointer;border-radius:6px;padding:1px 4px;transition:background .15s}
.sentence .word:hover{background:#ffe9a8}
.sentence .word.sel{background:var(--yellow);color:#5a4500}

/* speaker / TTS button */
.sentwrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sentwrap .sentence{margin:0;flex:1;min-width:0}
.speaker{width:40px;height:40px;border-radius:50%;background:#fff;border:1px solid var(--line);display:inline-grid;place-items:center;font-size:1.1rem;box-shadow:var(--shadow);flex:none;cursor:pointer;font-family:inherit;}
.speaker.sm{width:30px;height:30px;font-size:.9rem}
.speaker:active{transform:scale(.92)}

.opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.opt{
  border:3px solid var(--line);background:#fff;border-radius:14px;padding:14px;
  font-size:1.2rem;font-weight:bold;cursor:pointer;font-family:inherit;color:var(--ink);
  transition:transform .08s,border-color .15s,background .15s;
}
.opt:hover{border-color:var(--blue);transform:translateY(-2px)}
.opt.correct{background:var(--green);border-color:var(--green-d);color:#fff;animation:pop .35s}
.opt.wrong{background:var(--red);border-color:var(--red-d);color:#fff;animation:shake .35s}
.opt.dim{opacity:.5}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}

/* drag */
.dragzone{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px;justify-content:center}
.chip{
  background:linear-gradient(160deg,#4a9fe0,var(--blue-d));color:#fff;border:none;
  padding:11px 16px;border-radius:30px;font-size:1.1rem;font-weight:bold;cursor:grab;
  font-family:inherit;transition:transform .08s;
  touch-action:none;
}
.chip:active{cursor:grabbing;transform:scale(1.06)}
.chip.used{opacity:.3;pointer-events:none}
.drop{display:inline-block;min-width:90px;border:3px dashed var(--blue);border-radius:12px;
  padding:2px 10px;color:var(--blue);text-align:center;vertical-align:middle}
.drop.over{background:#dff0ff;border-style:solid}
.drop.filled{border-style:solid;background:var(--green);color:#fff;border-color:var(--green-d)}

/* text input */
.tinput{width:100%;font-size:1.15rem;font-family:inherit;padding:13px 15px;border:3px solid var(--line);
  border-radius:14px;margin-top:14px;color:var(--ink);font-weight:bold}
.tinput:focus{outline:none;border-color:var(--blue)}

.btn{
  border:none;cursor:pointer;border-radius:14px;padding:13px 22px;font-size:1rem;font-weight:bold;
  font-family:inherit;color:#fff;background:linear-gradient(160deg,#56d98a,var(--green-d));
  transition:transform .08s;
}
.btn:active{transform:translateY(2px)}
.btn.blue{background:linear-gradient(160deg,#4a9fe0,var(--blue-d))}
.btn.grey{background:linear-gradient(160deg,#9fb0c4,#6b7d92)}
.btn.full{width:100%;margin-top:14px}
.btn.sm{padding:9px 16px;font-size:.85rem}
.btnrow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.btnrow .btn{flex:1;min-width:120px}

/* feedback */
.fb{margin-top:16px;border-radius:14px;padding:14px 16px;font-size:.95rem;animation:fade .3s both;display:none}
.fb.show{display:block}
.fb.good{background:#e3f9ec;border:2px solid var(--green);color:var(--green-d)}
.fb.bad{background:#ffe9e9;border:2px solid var(--red);color:var(--red-d)}
.fb .big{font-size:1.15rem;font-weight:bold;display:block;margin-bottom:4px}
.fb .corr{font-weight:bold}

.topbtn{background:var(--blue);border:none;color:#fff;border-radius:12px;
  padding:9px 16px;font-weight:bold;font-family:inherit;cursor:pointer;font-size:.9rem}
.topbtn:hover{background:var(--blue-d)}
.topbtn:active{transform:scale(.96)}
.backrow{display:flex;justify-content:space-between;align-items:center;margin-top:14px}

/* stats */
.statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:6px}
.stat{background:linear-gradient(160deg,#f4f8fc,#e9f1fa);border-radius:16px;padding:14px;text-align:center;border:2px solid var(--line)}
.stat .n{font-size:1.9rem;font-weight:bold;color:var(--blue-d);line-height:1}
.stat .l{font-size:.75rem;color:var(--ink-soft);font-weight:bold;margin-top:4px}
.preplist{margin-top:8px}
.preprow{display:flex;align-items:center;gap:10px;margin:7px 0}
.prepname{width:64px;font-weight:bold;font-size:1rem}
.prepbar{flex:1;height:14px;background:var(--line);border-radius:10px;overflow:hidden}
.prepbar i{display:block;height:100%;border-radius:10px}
.preppct{width:46px;text-align:right;font-size:.8rem;font-weight:bold;color:var(--ink-soft)}
.tag{display:inline-block;background:var(--yellow);color:#5a4500;border-radius:20px;padding:4px 11px;font-weight:bold;font-size:.85rem;margin:3px 4px 0 0}
.tag.weak{background:#ffd6d6;color:var(--red-d)}
.tag.strong{background:#cdf3da;color:var(--green-d)}

/* speed */
.timer{font-size:2.4rem;font-weight:bold;text-align:center;color:var(--red-d);margin:4px 0}
.timer.warn{animation:pulse .5s infinite}
@keyframes pulse{50%{color:var(--yellow-d);transform:scale(1.06)}}
.scoreline{text-align:center;font-size:1rem;font-weight:bold;color:var(--ink-soft)}

.hint{font-size:.82rem;color:var(--ink-soft);margin-top:10px;text-align:center}
.streakpop{position:fixed;left:50%;top:24%;transform:translateX(-50%);background:var(--yellow);
  color:#5a4500;font-weight:bold;padding:10px 20px;border-radius:30px;box-shadow:var(--shadow);
  font-size:1.1rem;z-index:50;pointer-events:none;animation:streak 1.1s ease both}
@keyframes streak{0%{opacity:0;transform:translateX(-50%) scale(.6)}25%{opacity:1;transform:translateX(-50%) scale(1.1)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}

.particle{position:fixed;width:10px;height:10px;border-radius:50%;pointer-events:none;z-index:40;
  animation:burst .7s ease-out forwards}
@keyframes burst{to{transform:translate(var(--dx),var(--dy));opacity:0}}

footer{text-align:center;color:rgba(255,255,255,.85);font-size:.72rem;margin-top:22px;font-weight:bold}
.hide{display:none!important}
@media(max-width:430px){
  .sentence{font-size:1.25rem}
  .menu-grid{grid-template-columns:repeat(2,1fr)}
  .dex h1{font-size:1.05rem}
  .opt{font-size:1.05rem}
}
.dsg-home{position:fixed;top:14px;right:14px;z-index:999999;display:inline-flex;align-items:center;gap:6px;background:rgba(20,20,30,.62);color:#fff;text-decoration:none;font:700 .85rem 'Segoe UI',system-ui,sans-serif;padding:9px 16px;border-radius:999px;backdrop-filter:blur(4px);box-shadow:0 4px 14px rgba(0,0,0,.25);transition:transform .15s ease,background .15s ease}
.dsg-home:hover{transform:translateY(-2px);background:rgba(20,20,30,.8)}
</style>
</head>
<body>
<a class="dsg-home" href="index.html" title="Tilbage til spiloversigt">🏠 Oversigt</a>
<div class="wrap">

  <div class="dex">
    <div class="dexlight"></div>
    <div>
      <h1>Præpositions-Mester</h1>
      <p>Bliv ekspert i danske præpositioner!</p>
    </div>
    <div class="minidots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
  </div>

  <div class="pbar-wrap">
    <div class="pbar-top"><span id="lvlText">Niveau 1 · Nybegynder</span><span id="xpText">0 XP</span></div>
    <div class="pbar"><div class="pbar-fill" id="pbarFill"></div></div>
  </div>

  <!-- MENU -->
  <div id="menu">
    <div class="card">
      <div class="section-title" style="color:var(--ink);margin-top:0">Vælg en øvelse</div>
      <div class="menu-grid" id="menuGrid"></div>
    </div>
    <div class="section-title">Din fremgang</div>
    <div class="card" style="margin-top:8px" id="miniStats"></div>
  </div>

  <!-- EXERCISE -->
  <div id="exercise" class="hide"></div>

  <!-- STATS -->
  <div id="stats" class="hide"></div>

</div>

<script>
"use strict";

/* ============================================================
   PRÆPOSITIONER + DATA
   ============================================================ */
const PREPS = ["i","på","til","for","med","af","om","hos","fra","efter","uden","under","over","mellem","ved"];

// confusion map: which wrong prepositions a learner is most likely to use
const CONFUSE = {
  "i":["på","til","ved"], "på":["i","ved","til"], "til":["i","for","hos"],
  "for":["til","af","om"], "med":["uden","af","ved"], "af":["fra","for","af"],
  "om":["på","over","for"], "hos":["i","ved","til"], "fra":["af","fra","til"],
  "efter":["til","for","under"], "uden":["med","uden","for"], "under":["over","i","ved"],
  "over":["under","på","om"], "mellem":["under","ved","i"], "ved":["på","i","hos"]
};

const ITEMS = [];
// gen(pattern, answer, fills, explanation, theme, {err, pair})
// pattern uses {a} for the preposition slot and {x} for the variable noun
function gen(pattern, answer, fills, ex, theme, opts){
  opts = opts || {};
  fills.forEach(function(x){
    ITEMS.push({
      text: pattern.replace("{a}", answer).replace("{x}", x),
      a: answer, ex: ex, theme: theme,
      err: opts.err || (CONFUSE[answer]?CONFUSE[answer][0]:"i"),
      pair: opts.pair || null
    });
  });
}

/* ---------- i ---------- */
gen("Jeg bor {a} {x}.","i",["København","Aarhus","Odense","Aalborg","Esbjerg","Randers","en lejlighed","et rækkehus","centrum","en lille by"],
  "Byer, lande og boliger tager 'i': man bor i en by eller i et hus.","Bolig",{err:"på",pair:"i|på"});
gen("Vi mødes {a} {x}.","i",["kantinen","mødelokalet","biografen","kælderen","klasselokalet","svømmehallen"],
  "Indvendigt i lukkede rum bruger man 'i': i kantinen, i biografen.","Arbejde",{err:"på",pair:"i|på"});
gen("Mødet ligger {a} {x}.","i",["januar","februar","marts","maj","august","oktober","december"],
  "Måneder og årstider tager 'i': i januar, i sommer.","Møder",{err:"på"});
gen("Børnene går {a} {x}.","i",["skole","kirke","børnehave","biografen","byen","teatret"],
  "Faste udtryk med aktivitet: gå i skole, i kirke, i byen.","Familie",{err:"på"});
gen("Der er mange varer {a} {x}.","i",["Netto","kurven","butikken","køleskabet","tasken","skuffen"],
  "Inde i en beholder eller butik: i kurven, i køleskabet.","Indkøb",{err:"på"});
gen("Han sidder stadig {a} {x}.","i",["bilen","toget","sofaen","haven","mørket"],
  "Inde i et køretøj eller rum: i bilen, i toget.","Rejse",{err:"på"});

/* ---------- på ---------- */
gen("Jeg arbejder {a} {x}.","på",["kontoret","fabrikken","hospitalet","værkstedet","posthuset","biblioteket","en café","apoteket"],
  "Mange arbejdspladser og institutioner tager 'på': på kontoret, på hospitalet.","Arbejde",{err:"i",pair:"i|på"});
gen("Bogen ligger {a} {x}.","på",["bordet","gulvet","hylden","skrivebordet","stolen","sengen","reolen"],
  "Oven på en flade bruger man 'på': på bordet, på gulvet.","Hjem",{err:"i",pair:"i|på"});
gen("Vi ses {a} {x}.","på",["stationen","torvet","gaden","pladsen","hjørnet"],
  "Åbne steder og pladser tager ofte 'på': på stationen, på torvet.","Rejse",{err:"i"});
gen("Hun er {a} {x} i dag.","på",["vagt","ferie","barsel","kursus","besøg","udflugt"],
  "Faste tilstandsudtryk: på arbejde, på ferie, på kursus.","Arbejde",{err:"i"});
gen("Skriv det venligst {a} {x}.","på",["listen","tavlen","papiret","computeren","telefonen"],
  "På en overflade eller skærm: på listen, på tavlen.","Møder",{err:"i"});
gen("Vi bor {a} {x}.","på",["landet","femte sal","et hotel","en bondegård","Frederiksberg"],
  "Særlige bolig-udtryk tager 'på': på landet, på femte sal, på hotel.","Bolig",{err:"i",pair:"i|på"});

/* ---------- til ---------- */
gen("Jeg skal {a} {x} i morgen.","til",["København","mødet","lægen","tandlægen","frisøren","stranden","fest","koncert"],
  "Bevægelse mod et mål eller en begivenhed tager 'til': til mødet, til lægen.","Rejse",{err:"i",pair:"i|til"});
gen("Vi glæder os {a} {x}.","til",["weekenden","ferien","jul","sommeren","festen","at se dig"],
  "'Glæde sig til' styrer altid 'til' + det man ser frem til.","Familie",{err:"for"});
gen("Hun gav gaven {a} {x}.","til",["sin mor","læreren","chefen","sin ven","naboen","barnet"],
  "Modtageren af noget får 'til': give noget til nogen.","Familie",{err:"for"});
gen("Hvad skal vi have {a} {x}?","til",["aftensmad","frokost","dessert","middag","morgenmad"],
  "Måltider som formål tager 'til': hvad skal vi have til frokost.","Mad",{err:"for"});
gen("Brevet er {a} {x}.","til",["dig","direktøren","hele afdelingen","kunden","min familie"],
  "Adressaten for et brev eller besked får 'til'.","Arbejde",{err:"for"});
gen("Jeg cykler {a} {x} hver dag.","til",["arbejde","skole","stationen","træning","byen"],
  "Mål for en daglig tur tager 'til': cykle til arbejde.","Transport",{err:"på",pair:"i|til"});

/* ---------- for ---------- */
gen("Tak {a} {x}!","for",["hjælpen","maden","kaffen","gaven","invitationen","i dag","sidst","lånet"],
  "'Tak for ...' bruger altid 'for'.","Høflighed",{err:"til"});
gen("Jeg er bange {a} {x}.","for",["hunde","edderkopper","mørket","højder","at flyve","at komme for sent"],
  "'Bange for' styrer 'for' + det man frygter.","Følelser",{err:"af"});
gen("Hun kæmper {a} {x}.","for",["en god sag","miljøet","de fattige","menneskerettigheder","klimaet"],
  "At gøre en indsats i tjeneste af en sag tager 'for': kæmpe for en god sag.","Samfund",{err:"til"});
gen("Det er godt {a} {x}.","for",["helbredet","miljøet","dig","kroppen","din karriere"],
  "Til gavn for nogen/noget: godt for helbredet.","Sundhed",{err:"til"});
gen("Du arbejder {a} {x}.","for",["meget","hårdt","længe"],
  "'For' kan betyde 'i for høj grad': for meget, for hårdt, for længe.","Arbejde",{err:"til"});
gen("Hun interesserer sig {a} {x}.","for",["kunst","politik","fodbold","historie","klassisk musik"],
  "'Interessere sig for' styrer altid 'for'.","Fritid",{err:"om"});
gen("Hun er ansvarlig {a} {x}.","for",["projektet","hele teamet","økonomien","afdelingen","sikkerheden"],
  "'Ansvarlig for' styrer altid 'for'.","Arbejde",{err:"til"});

/* ---------- med ---------- */
gen("Jeg tager {a} {x} på arbejde.","med",["bussen","toget","metroen","færgen","bilen"],
  "Transportmiddel man rejser med: tage med bussen, med toget.","Transport",{err:"i",pair:"med|uden"});
gen("Hun bor sammen {a} {x}.","med",["sin kæreste","sin familie","en veninde","sine forældre","sin hund"],
  "'Sammen med' angiver selskab: bo sammen med nogen.","Familie",{err:"hos"});
gen("Kan du hjælpe mig {a} {x}?","med",["opgaven","flytningen","maden","computeren","regnskabet","tasken"],
  "'Hjælpe med' styrer 'med' + det man hjælper med.","Arbejde",{err:"i"});
gen("Jeg drikker kaffe {a} {x}.","med",["en kollega","mælk","en god ven","sukker","fløde"],
  "Ledsagelse eller tilbehør: kaffe med mælk, kaffe med en ven.","Mad",{err:"uden",pair:"med|uden"});
gen("Han betalte {a} {x}.","med",["kort","kontanter","mobilen","MobilePay"],
  "Betalingsmiddel tager 'med': betale med kort.","Indkøb",{err:"i"});
gen("Vi er meget tilfredse {a} {x}.","med",["resultatet","servicen","den nye kollega","mødet","produktet"],
  "'Tilfreds med' styrer altid 'med'.","Arbejde",{err:"af"});

/* ---------- af ---------- */
gen("Bordet er lavet {a} {x}.","af",["træ","glas","metal","plastik","sten","massivt egetræ"],
  "Materiale noget er lavet af: lavet af træ.","Bolig",{err:"fra",pair:"af|fra"});

/* ============================================================
   STATE + PERSISTENCE
   ============================================================ */
const SKEY = "praep_mester_v1";
const FEEDBACK_GOOD = ["Godt klaret!","Flot arbejde!","Super!","Perfekt!","Sådan!","Du er en mester!"];
const FEEDBACK_BAD = ["Prøv igen!","Næsten!","Ikke helt!","Det lærer du!"];

let prog = loadProg();
function defaultProg(){
  const per = {};
  PREPS.forEach(p=>per[p]={c:0,w:0});
  return {total:0,correct:0,streak:0,best:0,xp:0,per:per,reviewQ:[]};
}
function loadProg(){
  try{
    const raw = localStorage.getItem(SKEY);
    if(!raw) return defaultProg();
    const p = JSON.parse(raw);
    const d = defaultProg();
    return Object.assign(d,p,{per:Object.assign(d.per,p.per||{})});
  }catch(e){ return defaultProg(); }
}
function saveProg(){ try{ localStorage.setItem(SKEY, JSON.stringify(prog)); }catch(e){} }

function record(answerPrep, correct){
  prog.total++;
  if(!prog.per[answerPrep]) prog.per[answerPrep]={c:0,w:0};
  if(correct){
    prog.correct++; prog.streak++; prog.xp+=10;
    prog.per[answerPrep].c++;
    if(prog.streak>prog.best) prog.best=prog.streak;
  }else{
    prog.streak=0; prog.xp+=2;
    prog.per[answerPrep].w++;
  }
  saveProg();
  updateTopBar();
}
function addReview(item){
  // store a lightweight copy to repeat later
  if(prog.reviewQ.length>40) prog.reviewQ.shift();
  prog.reviewQ.push({text:item.text,a:item.a,ex:item.ex,theme:item.theme,err:item.err});
  saveProg();
}
function clearReviewItem(text){
  prog.reviewQ = prog.reviewQ.filter(r=>r.text!==text);
  saveProg();
}

   ============================================================ */
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function sample(arr,n){ return shuffle(arr.slice()).slice(0,n); }
function rand(item){ return JSON.parse(JSON.stringify(item)); }
function randItem(filter){
  let pool = ITEMS;
  if(filter) pool = ITEMS.filter(filter);
  if(pool.length===0) pool=ITEMS;
  return rand(pick(pool));
}
function blankSentence(item){ // replace the answer preposition (whole word) with a blank marker
  const re = new RegExp("(^|[\\s])"+item.a+"([\\s.,!?])");
  let done=false;
  return item.text.replace(re,function(m,p1,p2){ if(done) return m; done=true; return p1+"@@@"+p2; });
}
function distractorsFor(prep, n){
  const c = (CONFUSE[prep]||[]).filter(p=>p!==prep);
  let opts = [];
  c.forEach(x=>{ if(opts.indexOf(x)<0 && x!==prep) opts.push(x); });
  const rest = shuffle(PREPS.filter(p=>p!==prep && opts.indexOf(p)<0));
  while(opts.length<n && rest.length) opts.push(rest.shift());
  return opts.slice(0,n);
}
function goodMsg(){ return pick(FEEDBACK_GOOD); }
function badMsg(){ return pick(FEEDBACK_BAD); }

/* ============================================================
   SPEECH SYNTHESIS (Danish)
   ============================================================ */
let voices = [];
function refreshVoices(){
  if(!('speechSynthesis' in window)) return;
  voices = speechSynthesis.getVoices();
}
function danishVoice(){
  return voices.find(v=>/da(-|_)?DK/i.test(v.lang)) || voices.find(v=>/^da/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = refreshVoices;
  refreshVoices();
}
function speak(text){
  if(!('speechSynthesis' in window) || !text) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "da-DK";
    const v = danishVoice();
    if(v) u.voice = v;
    u.rate = 0.95;
    speechSynthesis.speak(u);
  }catch(e){/* ignore */}
}
function speakerBtn(text, cls){
  const b = document.createElement("button");
  b.className = "speaker " + (cls||"");
  b.type = "button";
  b.textContent = "🔊";
  b.setAttribute("aria-label","Udtal");
  b.addEventListener("click", e=>{ e.stopPropagation(); speak(text); });
  return b;
}

function burst(x,y){
  const colors=["#ee1515","#2a75bb","#ffcb05","#3ec46d"];
  for(let i=0;i<10;i++){
    const p=document.createElement("div");p.className="particle";
    p.style.cssText="left:"+x+"px;top:"+y+"px;background:"+pick(colors)+
      ";--dx:"+((Math.random()-0.5)*140)+"px;--dy:"+((Math.random()-0.5)*140)+"px";
    document.body.appendChild(p);
    p.addEventListener("animationend",()=>p.remove());
  }
}
function streakPop(n){
  const d=document.createElement("div");d.className="streakpop";d.textContent="🔥 "+n+" i træk!";
  document.body.appendChild(d);
  d.addEventListener("animationend",()=>d.remove());
}

const LEVELS=[

  [1000,"Ekspert"],[1600,"Mester"],[2400,"Stormester"],[3500,"Præpositions-Legende"]
];
function levelInfo(){
  let idx=0;
  for(let i=0;i<LEVELS.length;i++){ if(prog.xp>=LEVELS[i][0]) idx=i; }
  const cur=LEVELS[idx], next=LEVELS[idx+1];
  const floor=cur[0], ceil=next?next[0]:cur[0]+1000;
  const pct=Math.min(100,Math.round(((prog.xp-floor)/(ceil-floor))*100));
  return {num:idx+1,name:cur[1],pct:pct};
}

/* ---------- 1. FILL IN THE BLANK ---------- */
function nextFill(item){
  session.n++;
  item = item || randItem();
  const html = blankSentence(item).replace("@@@",'<span class="blank">?</span>');
  exShell("✏️ Udfyld hullet", item.theme,
    '<p class="prompt">Skriv den præposition der mangler:</p>'+
    '<div class="sentwrap"><div class="sentence">'+html+'</div></div>'+
    '<input class="tinput" id="fillIn" placeholder="fx i, på, til ..." autocomplete="off" autocapitalize="none">'+
    '<div class="btnrow"><button class="btn" id="fillCheck">Tjek svar</button>'+
    '<button class="btn grey" id="fillNext">Spring over</button></div>');
  document.querySelector(".sentwrap").appendChild(speakerBtn(item.text));
  const inp=document.getElementById("fillIn"); inp.focus();
  function check(){
    const val=inp.value.trim().toLowerCase();
    if(!val) return;
    const ok = val===item.a;
    document.querySelector(".blank").textContent=item.a;
    document.querySelector(".blank").classList.toggle("filled",ok);

    if(ok){ const r=inp.getBoundingClientRect(); burst(r.left+r.width/2,r.top); if(prog.streak%5===0&&prog.streak)streakPop(prog.streak);}
    else addReview(item);

    document.getElementById("fillCheck").textContent="Næste →";
    document.getElementById("fillCheck").onclick=()=>nextFill();
    inp.disabled=true;
    document.getElementById("fillNext").classList.add("hide");
  }
  document.getElementById("fillCheck").onclick=check;
  document.getElementById("fillNext").onclick=()=>nextFill();
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("fillCheck").onclick(); });
}

/* ---------- 2. MULTIPLE CHOICE ---------- */
function nextMC(item){
  session.n++;
  item=item||randItem();
  const opts=shuffle([item.a].concat(distractorsFor(item.a,3)));
  const html=blankSentence(item).replace("@@@",'<span class="blank" id="mcBlank">?</span>');
  exShell("🎯 Multiple choice", item.theme,
    '<p class="prompt">Vælg den rigtige præposition:</p>'+
    '<div class="sentwrap"><div class="sentence">'+html+'</div></div>'+
    '<div class="opts" id="mcOpts"></div>');
  document.querySelector(".sentwrap").appendChild(speakerBtn(item.text));
  const box=document.getElementById("mcOpts");
  opts.forEach((o,i)=>{
    const b=document.createElement("button");b.className="opt";
    b.textContent=String.fromCharCode(65+i)+") "+o;
    b.onclick=(e)=>{
      const ok=o===item.a;
      document.querySelectorAll("#mcOpts .opt").forEach(x=>{x.classList.add("dim");x.onclick=null;});
      b.classList.remove("dim");
      b.classList.add(ok?"correct":"wrong");
      if(!ok){ document.querySelectorAll("#mcOpts .opt").forEach(x=>{ if(x.textContent.endsWith(") "+item.a)){x.classList.remove("dim");x.classList.add("correct");} }); addReview(item); }
      document.getElementById("mcBlank").textContent=item.a;
      document.getElementById("mcBlank").classList.toggle("filled",ok);
      record(item.a,ok);
      if(ok){ burst(e.clientX,e.clientY); if(prog.streak%5===0&&prog.streak)streakPop(prog.streak); }
      showFB(ok,item,item.a);
      const nb=document.createElement("button");nb.className="btn full";nb.textContent="Næste →";nb.onclick=()=>nextMC();
      box.after(nb);
    };
    box.appendChild(b);
  });
}

/* ---------- 3. DRAG & DROP ---------- */
function nextDrag(item){
  session.n++;
  item=item||randItem();
  const chips=shuffle([item.a].concat(distractorsFor(item.a,3)));
  const html=blankSentence(item).replace("@@@",'<span class="drop" id="dropZone">slip her</span>');
  exShell("🧲 Træk & slip", item.theme,
    '<p class="prompt">Træk den rigtige præposition ind i sætningen:</p>'+
    '<div class="sentwrap"><div class="sentence">'+html+'</div></div>'+
    '<div class="dragzone" id="chips"></div>'+
    '<div class="hint">På mobil: tryk på en brik for at placere den.</div>');
  document.querySelector(".sentwrap").appendChild(speakerBtn(item.text));
  const drop=document.getElementById("dropZone");
  const cbox=document.getElementById("chips");
  let answered=false;
  function place(val,chipEl,x,y){
    if(answered) return;
    answered=true;
    const ok=val===item.a;
    drop.textContent=val;
    drop.classList.add("filled");
    if(!ok) drop.style.background="var(--red)",drop.style.borderColor="var(--red-d)";
    record(item.a,ok);
    if(ok){ burst(x||window.innerWidth/2,y||200); if(prog.streak%5===0&&prog.streak)streakPop(prog.streak);} else addReview(item);
    showFB(ok,item,item.a);
    document.querySelectorAll(".chip").forEach(c=>c.classList.add("used"));
    const nb=document.createElement("button");nb.className="btn full";nb.textContent="Næste →";nb.onclick=()=>nextDrag();
    cbox.after(nb);
  }
  chips.forEach(val=>{
    const c=document.createElement("button");c.className="chip";c.textContent=val;c.draggable=true;
    c.addEventListener("dragstart",e=>{ e.dataTransfer.setData("text",val); });
    c.addEventListener("click",e=>place(val,c,e.clientX,e.clientY)); // tap support
    cbox.appendChild(c);
  });
  drop.addEventListener("dragover",e=>{e.preventDefault();drop.classList.add("over");});
  drop.addEventListener("dragleave",()=>drop.classList.remove("over"));
  drop.addEventListener("drop",e=>{e.preventDefault();drop.classList.remove("over");place(e.dataTransfer.getData("text"),null,e.clientX,e.clientY);});
}

/* ---------- 4. FIND THE MISTAKE ---------- */
function nextMistake(item){
  session.n++;
  item=item||randItem(it=>it.err && it.err!==it.a && !(new RegExp("(^|\\s)"+it.err+"(\\s|[.,!?])").test(it.text)));
  // tokenize the ORIGINAL correct text and swap only the first occurrence of item.a,
  // remembering its token index so grading checks position, not string value
  // (a sentence can legitimately contain the distractor word elsewhere)
  const rawWords = item.text.split(/(\s+)/);
  let errIndex = -1;
  const words = rawWords.map((w,i)=>{
    if(errIndex===-1){
      const clean=w.replace(/[.,!?]/g,"");
      if(clean.toLowerCase()===item.a.toLowerCase()){
        errIndex=i;
        return item.err + w.slice(clean.length);
      }
    }
    return w;
  });
  exShell("🔍 Find fejlen", item.theme,
    '<p class="prompt">Én præposition er forkert. Tryk på det forkerte ord:</p>'+
    '<div class="sentwrap"><div class="sentence" id="msSent"></div></div>');
  document.querySelector(".sentwrap").appendChild(speakerBtn(item.text));
  const sent=document.getElementById("msSent");
  let answered=false;
  words.forEach((w,wi)=>{
    const clean=w.replace(/[.,!?]/g,"");
    if(/\S/.test(w) && PREPS.indexOf(clean.toLowerCase())>=0){
      const span=document.createElement("span");span.className="word";span.textContent=w;
      span.onclick=(e)=>{
        if(answered) return; answered=true;
        const ok = (wi===errIndex);
        document.querySelectorAll("#msSent .word").forEach(x=>x.onclick=null);
        if(ok){ span.classList.add("sel"); burst(e.clientX,e.clientY); }
        record(item.a,ok);
        if(!ok) addReview(item);
        const fb=document.getElementById("fb");
        fb.className="fb show "+(ok?"good":"bad");
        fb.innerHTML='<span class="big">'+(ok?"✅ "+goodMsg():"❌ "+badMsg())+'</span>'+
          '<div>Fejlen: <span class="corr">'+item.err+' → '+item.a+'</span></div>'+
          '<div style="margin-top:6px">Korrekt: <b>'+item.text+'</b></div>'+
          '<div style="margin-top:6px">💡 '+item.ex+'</div>';
        const nb=document.createElement("button");nb.className="btn full";nb.textContent="Næste →";nb.onclick=()=>nextMistake();
        sent.after(nb);
      };
      sent.appendChild(span);
    } else {
      sent.appendChild(document.createTextNode(w));
    }
  });
}

/* ---------- 5. SENTENCE CORRECTION ---------- */
function nextCorrect(item){
  session.n++;
  item=item||randItem(it=>it.err && it.err!==it.a && !(new RegExp("(^|\\s)"+it.err+"(\\s|[.,!?])").test(it.text)));
  const wrongText = item.text.replace(new RegExp("(^|[\\s])"+item.a+"([\\s.,!?])"), "$1"+item.err+"$2");
  exShell("📝 Ret sætningen", item.theme,
    '<p class="prompt">Denne sætning har en forkert præposition. Skriv den korrekt:</p>'+
    '<div class="sentwrap"><div class="sentence" style="color:var(--red-d)">'+wrongText+'</div></div>'+
    '<input class="tinput" id="corrIn" placeholder="Skriv hele den rettede sætning ...">'+
    '<div class="hint">Tip: du kan også bare skrive den rigtige præposition.</div>'+
    '<div class="btnrow"><button class="btn" id="corrCheck">Tjek svar</button>'+
    '<button class="btn grey" id="corrShow">Vis svar</button></div>');
  document.querySelector(".sentwrap").appendChild(speakerBtn(item.text));
  const inp=document.getElementById("corrIn");inp.focus();
  function norm(s){ return s.toLowerCase().replace(/[.,!?]/g,"").replace(/\s+/g," ").trim(); }
  function finish(ok){
    record(item.a,ok); if(!ok) addReview(item);
    const fb=document.getElementById("fb");
    fb.className="fb show "+(ok?"good":"bad");
    fb.innerHTML='<span class="big">'+(ok?"✅ "+goodMsg():"❌ "+badMsg())+'</span>'+
      '<div>Korrekt: <span class="corr">'+item.text+'</span></div>'+
      '<div style="margin-top:6px">💡 '+item.ex+'</div>';
    document.getElementById("corrCheck").textContent="Næste →";
    document.getElementById("corrCheck").onclick=()=>nextCorrect();
    document.getElementById("corrShow").classList.add("hide");
    inp.disabled=true;
    if(ok){ const r=inp.getBoundingClientRect(); burst(r.left+r.width/2,r.top); }
  }
  document.getElementById("corrCheck").onclick=function(){
    const v=norm(inp.value); if(!v) return;
    const ok = v===norm(item.text) || v===item.a;
    finish(ok);
  };
  document.getElementById("corrShow").onclick=()=>finish(false);
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("corrCheck").onclick(); });
}

      document.querySelectorAll("#prOpts .opt").forEach(x=>{x.classList.add("dim");x.onclick=null;});
      b.classList.remove("dim");b.classList.add(ok?"correct":"wrong");
      if(!ok){ document.querySelectorAll("#prOpts .opt").forEach(x=>{ if(x.textContent===item.a){x.classList.remove("dim");x.classList.add("correct");} }); addReview(item);}
      document.getElementById("prBlank").textContent=item.a;
      document.getElementById("prBlank").classList.toggle("filled",ok);
      record(item.a,ok);
      if(ok){ burst(e.clientX,e.clientY); if(prog.streak%5===0&&prog.streak)streakPop(prog.streak); }
      showFB(ok,item,item.a);
      const nb=document.createElement("button");nb.className="btn full";nb.textContent="Næste →";nb.onclick=()=>nextPair();
      box.after(nb);
    };
    box.appendChild(b);
  });
}

/* ---------- 8. SPEED ROUND ---------- */
let speedTimer=null, speedLeft=60, speedScore=0, speedHits=0, speedMiss=0;
function startSpeed(){
  speedLeft=60; speedScore=0; speedHits=0; speedMiss=0;
  speedTick(true);
  if(speedTimer) clearInterval(speedTimer);
  speedTimer=setInterval(()=>{
    speedLeft--;
    const t=document.getElementById("spTimer");
    if(t){ t.textContent=speedLeft+"s"; t.classList.toggle("warn",speedLeft<=10); }
    if(speedLeft<=0) endSpeed();
  },1000);
  show("ex");
}
function speedTick(first){
  const item=randItem();
  const opts=shuffle([item.a].concat(distractorsFor(item.a,3)));
  const html=blankSentence(item).replace("@@@",'<span class="blank">?</span>');
  elEx.innerHTML=
    '<div class="card">'+
    '<div class="backrow"><button class="topbtn" onclick="goMenu()">‹ Menu</button>'+
    '<span class="qcount">⚡ Lynrunde</span></div>'+
    '<div class="timer'+(speedLeft<=10?' warn':'')+'" id="spTimer">'+speedLeft+'s</div>'+
    '<div class="scoreline">Point: '+speedScore+' &nbsp;·&nbsp; ✅ '+speedHits+' &nbsp; ❌ '+speedMiss+'</div>'+
    '<div class="sentwrap" style="justify-content:center"><div class="sentence" style="text-align:center">'+html+'</div></div>'+
    '<div class="opts" id="spOpts"></div>'+
    '</div>';
  document.querySelector(".sentwrap").appendChild(speakerBtn(item.text,"sm"));
  const box=document.getElementById("spOpts");
  opts.forEach(o=>{
    const b=document.createElement("button");b.className="opt";b.textContent=o;
    b.onclick=(e)=>{
      const ok=o===item.a;
      if(ok){ speedScore+=10; speedHits++; prog.xp+=5; b.classList.add("correct"); burst(e.clientX,e.clientY); }
      else { speedMiss++; b.classList.add("wrong"); addReview(item);
        document.querySelectorAll("#spOpts .opt").forEach(x=>{ if(x.textContent===item.a) x.classList.add("correct"); }); }
      record(item.a,ok);
      document.querySelectorAll("#spOpts .opt").forEach(x=>x.onclick=null);
      setTimeout(()=>{ if(speedLeft>0) speedTick(); }, ok?160:520);
    };
    box.appendChild(b);
  });
}
function endSpeed(){
  clearInterval(speedTimer); speedTimer=null;
  const acc=(speedHits+speedMiss)?Math.round(speedHits/(speedHits+speedMiss)*100):0;
  const best=parseInt(localStorage.getItem("praep_speed_best")||"0");
  if(speedScore>best) localStorage.setItem("praep_speed_best",speedScore);
  saveProg();
  elEx.innerHTML=
    '<div class="card" style="text-align:center">'+
    '<div style="font-size:3rem">⚡</div>'+
    '<h2 style="margin:6px 0">Tiden er gået!</h2>'+
    '<div class="statgrid" style="margin-top:10px">'+
    '<div class="stat"><div class="n">'+speedScore+'</div><div class="l">Point</div></div>'+
    '<div class="stat"><div class="n">'+Math.max(speedScore,best)+'</div><div class="l">Rekord</div></div>'+
    '<div class="stat"><div class="n">'+speedHits+'</div><div class="l">Rigtige</div></div>'+
    '<div class="stat"><div class="n">'+acc+'%</div><div class="l">Nøjagtighed</div></div>'+
    '</div>'+
    '<div class="btnrow"><button class="btn" onclick="startSpeed()">Spil igen</button>'+
    '<button class="btn blue" onclick="goMenu()">Menu</button></div>'+
    '</div>';
}

/* ---------- 9. REVIEW MODE ---------- */
function nextReview(){
  if(prog.reviewQ.length===0){
    elEx.innerHTML='<div class="card" style="text-align:center">'+
      '<div style="font-size:3rem">🎉</div>'+
      '<h2>Ingen fejl at gentage!</h2>'+
      '<p style="color:var(--ink-soft)">Når du laver fejl i en øvelse, samles de her, så du kan mestre dem.</p>'+
      '<button class="btn full" onclick="goMenu()">Tilbage til menu</button></div>';
    return;
  }
  session.n++;
  const item=prog.reviewQ[0];
  const opts=shuffle([item.a].concat(distractorsFor(item.a,3)));
  const html=blankSentence(item).replace("@@@",'<span class="blank" id="rvBlank">?</span>');
  exShell("🔁 Gentag fejl", item.theme,
    '<p class="prompt">Du svarede forkert tidligere — prøv igen ('+prog.reviewQ.length+' tilbage):</p>'+
    '<div class="sentwrap"><div class="sentence">'+html+'</div></div>'+
    '<div class="opts" id="rvOpts"></div>');
  document.querySelector(".sentwrap").appendChild(speakerBtn(item.text));
  const box=document.getElementById("rvOpts");
  opts.forEach(o=>{
    const b=document.createElement("button");b.className="opt";b.textContent=o;
    b.onclick=(e)=>{
      const ok=o===item.a;
      document.querySelectorAll("#rvOpts .opt").forEach(x=>{x.classList.add("dim");x.onclick=null;});
      b.classList.remove("dim");b.classList.add(ok?"correct":"wrong");
      if(!ok) document.querySelectorAll("#rvOpts .opt").forEach(x=>{ if(x.textContent===item.a){x.classList.remove("dim");x.classList.add("correct");} });
      document.getElementById("rvBlank").textContent=item.a;
      document.getElementById("rvBlank").classList.toggle("filled",ok);
      record(item.a,ok);
      if(ok){ clearReviewItem(item.text); burst(e.clientX,e.clientY); }
      else { prog.reviewQ.push(prog.reviewQ.shift()); saveProg(); } // move to back, try later
      showFB(ok,item,item.a);
      const nb=document.createElement("button");nb.className="btn full";nb.textContent= prog.reviewQ.length?"Næste →":"Færdig 🎉";
      nb.onclick=()=>nextReview();
      box.after(nb);
    };
    box.appendChild(b);
  });
}

/* ============================================================
   STATS PAGE
   ============================================================ */
function openStats(){ renderStats(); show("stats"); }
function renderStats(){
  const acc=prog.total?Math.round(prog.correct/prog.total*100):0;
  const speedBest=parseInt(localStorage.getItem("praep_speed_best")||"0");
  // per-preposition accuracy
  const rows=PREPS.map(p=>{
    const d=prog.per[p]||{c:0,w:0}; const tot=d.c+d.w;
    return {p:p,tot:tot,pct:tot?Math.round(d.c/tot*100):null};
  });
  const attempted=rows.filter(r=>r.tot>0);
  const weak=attempted.slice().sort((a,b)=>a.pct-b.pct).slice(0,3);
  const strong=attempted.slice().sort((a,b)=>b.pct-a.pct).slice(0,3);

  let bars="";
  rows.forEach(r=>{
    const pct=r.pct===null?0:r.pct;
    const col = r.pct===null?"#cdd6e0": pct>=80?"var(--green)":pct>=50?"var(--yellow)":"var(--red)";
    bars+='<div class="preprow"><div class="prepname">'+r.p+'</div>'+
      '<div class="prepbar"><i style="width:'+pct+'%;background:'+col+'"></i></div>'+
      '<div class="preppct">'+(r.pct===null?"–":pct+"%")+'</div></div>';
  });

  let weakTags = attempted.length? weak.map(r=>'<span class="tag weak">'+r.p+' ('+r.pct+'%)</span>').join("") : '<span style="color:var(--ink-soft)">Ikke nok data endnu</span>';
  let strongTags = attempted.length? strong.map(r=>'<span class="tag strong">'+r.p+' ('+r.pct+'%)</span>').join("") : '<span style="color:var(--ink-soft)">Ikke nok data endnu</span>';

  elStats.innerHTML=
    '<div class="card">'+
    '<div class="backrow"><button class="topbtn" onclick="goMenu()">‹ Menu</button>'+
    '<span class="qcount">📊 Statistik</span></div>'+
    '<div class="statgrid" style="margin-top:14px">'+
    '<div class="stat"><div class="n">'+acc+'%</div><div class="l">Nøjagtighed</div></div>'+
    '<div class="stat"><div class="n">'+prog.total+'</div><div class="l">Spørgsmål i alt</div></div>'+
    '<div class="stat"><div class="n">'+prog.streak+'</div><div class="l">Aktuel stime</div></div>'+
    '<div class="stat"><div class="n">'+prog.best+'</div><div class="l">Bedste stime</div></div>'+
    '<div class="stat"><div class="n">'+prog.xp+'</div><div class="l">XP i alt</div></div>'+
    '<div class="stat"><div class="n">'+speedBest+'</div><div class="l">Lynrunde-rekord</div></div>'+
    '</div>'+
    '<div class="section-title" style="color:var(--ink)">Svageste præpositioner</div>'+
    '<div>'+weakTags+'</div>'+
    '<div class="section-title" style="color:var(--ink)">Stærkeste præpositioner</div>'+
    '<div>'+strongTags+'</div>'+
    '<div class="section-title" style="color:var(--ink)">Alle præpositioner</div>'+
    '<div class="preplist">'+bars+'</div>'+
    '<button class="btn grey full" onclick="resetProg()">Nulstil al fremgang</button>'+
    '</div>';
}
function resetProg(){
  if(confirm("Er du sikker? Al din fremgang slettes.")){
    prog=defaultProg(); saveProg();
    localStorage.removeItem("praep_speed_best");
    updateTopBar(); renderStats(); renderMenu();
  }
}

/* ============================================================
   INIT
   ============================================================ */
window.__ITEM_COUNT__ = ITEMS.length; // for testing
renderMenu();
renderMiniStats();
updateTopBar();
show("menu");
</script>
