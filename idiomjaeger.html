<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idiomjæger — Dansk Idiom Skattejagt</title>
<style>
:root{
  --parchment:#f3e3c3;
  --parchment-dark:#e6cfa0;
  --ink:#3a2c18;
  --ink-soft:#5e4a2e;
  --map-sea:#1f6b6b;
  --map-sea-dark:#134f52;
  --gold:#c8941f;
  --gold-light:#f0c14b;
  --red:#b5362e;
  --green:#3f8f4a;
  --green-dark:#2c6b35;
  --shadow:rgba(40,25,5,0.35);
  --a2:#3f8f4a; --b1:#2f80b5; --b2:#b5701f; --c1:#9b3b8f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Georgia','Times New Roman',serif;
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,0.06), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(0,0,0,0.18), transparent 45%),
    linear-gradient(160deg,var(--map-sea),var(--map-sea-dark));
  color:var(--ink);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:14px;
}
.wrap{width:min(640px,100%);}
header.app{
  text-align:center;margin:6px 0 14px;color:var(--parchment);
}
header.app h1{
  margin:0;font-size:2.1rem;letter-spacing:1px;
  text-shadow:2px 2px 0 var(--map-sea-dark),0 4px 10px rgba(0,0,0,.4);
}
header.app h1 .compass{display:inline-block;animation:spin 14s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
header.app p{margin:4px 0 0;font-style:italic;opacity:.9;font-size:.95rem;}

.panel{
  background:
    repeating-linear-gradient(0deg,transparent,transparent 26px,rgba(160,120,60,0.05) 27px),
    linear-gradient(180deg,var(--parchment),var(--parchment-dark));
  border:3px solid #8a6a35;
  border-radius:14px;
  box-shadow:0 10px 34px var(--shadow),inset 0 0 50px rgba(180,140,80,.25);
  padding:18px;
  position:relative;
  animation:fade-in .35s ease;
}
.panel::before,.panel::after{
  content:"";position:absolute;width:16px;height:16px;border:2px solid var(--gold);
  opacity:.7;
}
.panel::before{top:6px;left:6px;border-right:none;border-bottom:none;}
.panel::after{bottom:6px;right:6px;border-left:none;border-top:none;}
@keyframes fade-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

h2.section-title{
  margin:0 0 12px;text-align:center;font-size:1.35rem;color:var(--ink);
  border-bottom:2px dashed #b08a4a;padding-bottom:8px;
}

/* Top bar */
.topbar{
  display:flex;gap:8px;align-items:center;justify-content:space-between;
  margin-bottom:12px;flex-wrap:wrap;
}
.coins{
  background:var(--ink);color:var(--gold-light);border-radius:20px;
  padding:5px 14px;font-weight:bold;font-size:.9rem;box-shadow:0 2px 6px var(--shadow);
}
.coins span{color:#fff;}

/* Buttons */
.btn{
  cursor:pointer;border:2px solid #7a5b2a;border-radius:10px;
  padding:12px 16px;font-size:1rem;font-weight:bold;font-family:inherit;
  background:linear-gradient(180deg,#fff6e0,var(--parchment-dark));
  color:var(--ink);transition:transform .08s,box-shadow .12s,background .15s;
  box-shadow:0 3px 0 #7a5b2a,0 4px 8px var(--shadow);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 0 #7a5b2a,0 8px 14px var(--shadow);}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 #7a5b2a;}
.btn.primary{background:linear-gradient(180deg,var(--gold-light),var(--gold));color:#3a2c18;border-color:#8a6512;box-shadow:0 3px 0 #8a6512,0 4px 8px var(--shadow);}
.btn.primary:hover{box-shadow:0 5px 0 #8a6512,0 8px 14px var(--shadow);}
.btn.ghost{background:transparent;box-shadow:none;border-style:dashed;}
.btn.ghost:hover{background:rgba(255,255,255,.3);transform:none;}
.btn.small{padding:7px 12px;font-size:.85rem;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.menu-grid .btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:18px 10px;text-align:center;}
.menu-grid .btn .ico{font-size:1.7rem;}
.menu-grid .btn .sub{font-weight:normal;font-size:.72rem;opacity:.75;}
@media(max-width:420px){.menu-grid{grid-template-columns:1fr;}}

.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.row.between{justify-content:space-between;}
.center{text-align:center;}
.mt{margin-top:14px;}
.mb{margin-bottom:14px;}
.hidden{display:none!important;}

/* Filters / selects */
select,input[type=text]{
  font-family:inherit;font-size:.95rem;padding:8px 10px;border-radius:8px;
  border:2px solid #8a6a35;background:#fff8ea;color:var(--ink);
}
label.flt{display:flex;flex-direction:column;gap:3px;font-size:.78rem;font-weight:bold;color:var(--ink-soft);}

/* Stat / progress */
.hp-bar{height:14px;background:#d8c194;border-radius:8px;overflow:hidden;border:2px solid #8a6a35;}
.hp-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .4s;}
.lives{font-size:1.2rem;letter-spacing:2px;}

/* Game card */
.q-prompt{
  font-size:1.3rem;text-align:center;margin:10px 0 16px;font-weight:bold;
  background:#fff8ea;border:2px dashed #b08a4a;border-radius:10px;padding:16px;line-height:1.5;
}
.q-sub{font-size:.85rem;font-style:italic;color:var(--ink-soft);display:block;margin-top:6px;font-weight:normal;}
.choices{display:grid;gap:10px;}
.choice{
  text-align:left;width:100%;
}
.choice.correct{background:linear-gradient(180deg,#bfe6c2,var(--green))!important;color:#0e3a18;border-color:var(--green-dark)!important;animation:pop .35s;}
.choice.wrong{background:linear-gradient(180deg,#eab4ae,var(--red))!important;color:#fff;border-color:#7d231d!important;animation:shake .35s;}
@keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}

.feedback{margin-top:14px;text-align:center;min-height:24px;font-weight:bold;font-size:1.05rem;}
.feedback.good{color:var(--green-dark);}
.feedback.bad{color:var(--red);}
.explain{
  margin-top:10px;background:#fff8ea;border-left:4px solid var(--gold);border-radius:6px;
  padding:10px 12px;font-size:.9rem;text-align:left;animation:fade-in .3s;
}
.explain b{color:var(--ink);}

.progress-line{font-size:.82rem;color:var(--ink-soft);text-align:center;margin-bottom:8px;}

/* Dictionary / learn list */
.list{display:flex;flex-direction:column;gap:10px;max-height:62vh;overflow-y:auto;padding:4px;}
.idiom-card{
  background:#fff8ea;border:2px solid #c9a85f;border-radius:10px;padding:12px 14px;
  box-shadow:0 2px 6px var(--shadow);
}
.idiom-card h3{margin:0 0 4px;font-size:1.1rem;color:var(--ink);}
.idiom-card .meaning{font-weight:bold;color:var(--ink-soft);margin-bottom:6px;}
.idiom-card .ex{font-style:italic;font-size:.9rem;margin-top:6px;}
.idiom-card .tr{font-size:.85rem;color:var(--ink-soft);}
.tag{display:inline-block;font-size:.68rem;font-weight:bold;color:#fff;border-radius:10px;padding:2px 8px;margin-right:5px;vertical-align:middle;}
.tag.cat{background:#7a5b2a;}
.lvl-badge{display:inline-block;font-size:.66rem;font-weight:bold;color:#fff;border-radius:6px;padding:2px 7px;}
.lvl-A2{background:var(--a2);} .lvl-B1{background:var(--b1);} .lvl-B2{background:var(--b2);} .lvl-C1{background:var(--c1);}
.mastered-dot{color:var(--gold);font-size:1rem;}
.related{margin-top:8px;font-size:.8rem;color:var(--ink-soft);}
.related b{color:var(--ink);}

/* Memory / match grids */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:520px){.mem-grid{grid-template-columns:repeat(3,1fr);}}
.mem-card{
  aspect-ratio:3/4;border-radius:8px;border:2px solid #7a5b2a;cursor:pointer;
  display:flex;align-items:center;justify-content:center;text-align:center;
  font-size:.72rem;padding:5px;font-weight:bold;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#3a2c18;
  transition:transform .2s;
}
.mem-card .face{display:none;}
.mem-card.flipped{background:#fff8ea;color:var(--ink);}
.mem-card.flipped .back{display:none;}
.mem-card.flipped .face{display:block;}
.mem-card.matched{background:linear-gradient(135deg,#bfe6c2,var(--green));color:#0e3a18;cursor:default;opacity:.85;}
.mem-card .back{font-size:1.5rem;}

.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.match-col{display:flex;flex-direction:column;gap:8px;}
.match-item{
  border:2px solid #7a5b2a;border-radius:8px;padding:10px;cursor:pointer;font-size:.85rem;
  background:#fff8ea;transition:all .15s;text-align:center;
}
.match-item.sel{background:var(--gold-light);border-color:var(--gold);transform:scale(1.02);}
.match-item.done{background:linear-gradient(180deg,#bfe6c2,var(--green));color:#0e3a18;cursor:default;opacity:.7;}
.match-item.miss{animation:shake .35s;}

/* Stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-box{background:#fff8ea;border:2px solid #c9a85f;border-radius:10px;padding:12px;text-align:center;}
.stat-box .num{font-size:1.7rem;font-weight:bold;color:var(--gold);text-shadow:1px 1px 0 #7a5b2a;}
.stat-box .lbl{font-size:.74rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;}
.bar-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:.8rem;}
.bar-row .name{width:130px;flex-shrink:0;}
.bar-track{flex:1;height:12px;background:#d8c194;border-radius:6px;overflow:hidden;border:1px solid #8a6a35;}
.bar-val{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));}
.bar-row .pct{width:38px;text-align:right;font-weight:bold;}

/* Achievements */
.badge-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(max-width:420px){.badge-grid{grid-template-columns:1fr;}}
.badge{
  display:flex;gap:10px;align-items:center;background:#fff8ea;border:2px solid #c9a85f;
  border-radius:10px;padding:10px;opacity:.45;filter:grayscale(.7);transition:all .3s;
}
.badge.un{opacity:1;filter:none;border-color:var(--gold);box-shadow:0 0 12px rgba(200,148,31,.5);}
.badge .ico{font-size:1.8rem;}
.badge .t{font-weight:bold;font-size:.9rem;}
.badge .d{font-size:.72rem;color:var(--ink-soft);}

/* Toast */
#toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);
  background:var(--ink);color:var(--gold-light);padding:14px 22px;border-radius:30px;
  font-weight:bold;box-shadow:0 6px 24px rgba(0,0,0,.5);z-index:50;border:2px solid var(--gold);
  transition:transform .4s cubic-bezier(.2,1.4,.4,1);text-align:center;max-width:90vw;
}
#toast.show{transform:translateX(-50%) translateY(0);}

/* Particles */
.particle{position:fixed;width:10px;height:10px;border-radius:50%;pointer-events:none;z-index:60;animation:burst .7s ease-out forwards;}
@keyframes burst{to{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0;}}

.text-input-row{display:flex;gap:8px;margin-top:6px;}
.text-input-row input{flex:1;}

.timer-big{font-size:1.5rem;font-weight:bold;text-align:center;color:var(--red);}
.scrollnote{font-size:.72rem;text-align:center;color:var(--ink-soft);font-style:italic;margin-top:6px;}
.empty{text-align:center;padding:30px 10px;color:var(--ink-soft);font-style:italic;}
.foot{text-align:center;color:var(--parchment);opacity:.7;font-size:.75rem;margin:14px 0 4px;}
.kbd{background:#fff8ea;border:1px solid #b08a4a;border-radius:4px;padding:1px 6px;font-size:.8rem;}
.dsg-home{position:fixed;top:14px;right:14px;z-index:999999;display:inline-flex;align-items:center;gap:6px;background:rgba(20,20,30,.62);color:#fff;text-decoration:none;font:700 .85rem 'Segoe UI',system-ui,sans-serif;padding:9px 16px;border-radius:999px;backdrop-filter:blur(4px);box-shadow:0 4px 14px rgba(0,0,0,.25);transition:transform .15s ease,background .15s ease}
.dsg-home:hover{transform:translateY(-2px);background:rgba(20,20,30,.8)}

.speaker{
  width:32px;height:32px;border-radius:50%;display:inline-grid;place-items:center;
  font-size:.9rem;flex:none;cursor:pointer;vertical-align:middle;margin-left:6px;
  border:2px solid #7a5b2a;background:linear-gradient(180deg,#fff6e0,var(--parchment-dark));
  color:var(--ink);box-shadow:0 2px 0 #7a5b2a,0 3px 6px var(--shadow);
  transition:transform .08s,box-shadow .12s;padding:0;line-height:1;
}
.speaker:hover{transform:translateY(-1px);}
.speaker:active{transform:scale(.92);box-shadow:0 1px 0 #7a5b2a;}
.speaker.small{width:26px;height:26px;font-size:.75rem;margin-left:4px;}
</style>
</head>

<script>
/* ============================================================
   IDIOMJÆGER — Danish idiom learning game
   Single-file. Data + engine + UI below.
   ============================================================ */

/* ---------- CATEGORIES ---------- */
const CATS = [
  "Everyday Life","Work & Meetings","Feelings & Emotions","Relationships",
  "Decision Making","Success & Failure","Problems & Challenges","Time",
  "Money","Communication","Society & News","Very Danish Expressions",
  "Humor & Informal Speech"
];
const CAT_ICON = {
  "Everyday Life":"🏡","Work & Meetings":"💼","Feelings & Emotions":"❤️","Relationships":"🤝",
  "Decision Making":"⚖️","Success & Failure":"🏆","Problems & Challenges":"⚠️","Time":"⏳",
  "Money":"💰","Communication":"💬","Society & News":"📰","Very Danish Expressions":"🇩🇰",
  "Humor & Informal Speech":"😄"
};

/* ---------- IDIOM DATABASE ----------
   d=danish, m=english meaning, x=explanation, e=danish example,
   t=english translation, l=level, c=category, k=keyword (for fill-in games) */
const DATA = [
/* ===== EVERYDAY LIFE ===== */
{d:"Ingen ko på isen",m:"No need to worry",x:"The situation is under control; there's no problem.",e:"Der er ingen ko på isen. Vi har stadig god tid.",t:"There's no need to worry. We still have plenty of time.",l:"A2",c:"Everyday Life",k:"ko"},
{d:"Tage det med ro",m:"Take it easy",x:"Stay calm and don't stress.",e:"Tag det nu med ro, vi når det hele.",t:"Just take it easy, we'll get it all done.",l:"A2",c:"Everyday Life",k:"ro"},
{d:"Slå to fluer med ét smæk",m:"Kill two birds with one stone",x:"Solve two problems with a single action.",e:"Hvis jeg handler på vej hjem, slår jeg to fluer med ét smæk.",t:"If I shop on my way home, I kill two birds with one stone.",l:"B1",c:"Everyday Life",k:"fluer"},
{d:"Springe over hvor gærdet er lavest",m:"Take the easy way out",x:"Choose the easiest option instead of doing it properly.",e:"Han springer altid over, hvor gærdet er lavest, i stedet for at læse ordentligt op.",t:"He always takes the easy way out instead of studying properly.",l:"B2",c:"Everyday Life",k:"gærdet"},
{d:"Gøre en lang historie kort",m:"To make a long story short",x:"Skip the details and get to the point.",e:"For at gøre en lang historie kort: vi blev enige til sidst.",t:"To make a long story short: we agreed in the end.",l:"B1",c:"Everyday Life",k:"kort"},
{d:"Have en finger med i spillet",m:"To have a hand in it",x:"Be involved in or partly responsible for something.",e:"Jeg tror, chefen havde en finger med i spillet, da han fik jobbet.",t:"I think the boss had a hand in it when he got the job.",l:"B2",c:"Everyday Life",k:"finger"},
{d:"Få noget på plads",m:"To get something sorted",x:"Arrange or settle something so it is in order.",e:"Lad os lige få detaljerne på plads, før vi går videre.",t:"Let's get the details sorted before we move on.",l:"A2",c:"Everyday Life",k:"plads"},
{d:"Det er ingen sag",m:"It's no trouble at all",x:"Something is very easy to do.",e:"At skifte et dæk? Det er ingen sag.",t:"Changing a tyre? It's no trouble at all.",l:"A2",c:"Everyday Life",k:"sag"},
{d:"Stå op med det forkerte ben først",m:"To get out of bed on the wrong side",x:"To be in a bad mood from the start of the day.",e:"Hun er sur i dag – hun er vist stået op med det forkerte ben.",t:"She's grumpy today – she must have got out of bed on the wrong side.",l:"B1",c:"Everyday Life",k:"ben"},
{d:"Køre træt i noget",m:"To grow weary of something",x:"To lose energy or motivation for something over time.",e:"Jeg er ved at køre træt i den lange pendling.",t:"I'm growing weary of the long commute.",l:"B2",c:"Everyday Life",k:"træt"},
{d:"Det går som smurt",m:"It's going smoothly",x:"Everything is working without problems.",e:"Efter lidt øvelse går det hele som smurt.",t:"After a bit of practice it's all going smoothly.",l:"B2",c:"Everyday Life",k:"smurt"},
{d:"Have hænderne fulde",m:"To have one's hands full",x:"To be very busy with responsibilities.",e:"Med tre børn har hun hænderne fulde.",t:"With three kids she has her hands full.",l:"B1",c:"Everyday Life",k:"hænderne"},
{d:"Lige om hjørnet",m:"Just around the corner",x:"Very close in time or distance.",e:"Sommerferien er lige om hjørnet.",t:"The summer holiday is just around the corner.",l:"A2",c:"Everyday Life",k:"hjørnet"},

/* ===== WORK & MEETINGS ===== */
{d:"Have mange bolde i luften",m:"To juggle many things at once",x:"To handle several tasks or projects at the same time.",e:"Som projektleder har hun mange bolde i luften til daglig.",t:"As a project manager she juggles many things every day.",l:"B1",c:"Work & Meetings",k:"bolde"},
{d:"Komme til sagen",m:"To get to the point",x:"To start talking about what really matters.",e:"Vi har ikke lang tid, så lad os komme til sagen.",t:"We don't have much time, so let's get to the point.",l:"B1",c:"Work & Meetings",k:"sagen"},
{d:"Trække i samme retning",m:"To pull in the same direction",x:"To work together toward a common goal.",e:"Hvis vi skal lykkes, må alle trække i samme retning.",t:"If we're to succeed, everyone must pull in the same direction.",l:"B2",c:"Work & Meetings",k:"retning"},
{d:"Lægge hovedet på blokken",m:"To stick one's neck out",x:"To take a personal risk by vouching for something.",e:"Jeg lægger gerne hovedet på blokken for, at planen holder.",t:"I'll happily stick my neck out that the plan will hold.",l:"B2",c:"Work & Meetings",k:"blokken"},
{d:"Tage hatten af for nogen",m:"To take one's hat off to someone",x:"To show great respect or admiration.",e:"Jeg tager hatten af for det stykke arbejde, du har lavet.",t:"I take my hat off to the work you've done.",l:"B2",c:"Work & Meetings",k:"hatten"},
{d:"Skære igennem",m:"To cut through / make a firm decision",x:"To end discussion and decide clearly.",e:"Til sidst måtte chefen skære igennem og træffe valget.",t:"In the end the boss had to cut through and make the call.",l:"B2",c:"Work & Meetings",k:"igennem"},
{d:"Gå planken ud",m:"To go all the way / see it through",x:"To carry something through to the very end.",e:"Vi har lovet kunden det, så nu går vi planken ud.",t:"We promised the client, so now we'll see it through.",l:"B2",c:"Work & Meetings",k:"planken"},
{d:"Lægge sig fladt ned",m:"To fully admit a mistake / apologise",x:"To openly take the blame without excuses.",e:"Firmaet lagde sig fladt ned og undskyldte fejlen.",t:"The company fully admitted the mistake and apologised.",l:"B2",c:"Work & Meetings",k:"fladt"},
{d:"Tage teten",m:"To take the lead",x:"To take charge and set the direction.",e:"Nogen må tage teten, ellers sker der ingenting.",t:"Someone has to take the lead, or nothing will happen.",l:"C1",c:"Work & Meetings",k:"teten"},
{d:"Have rygdækning",m:"To have backing / support",x:"To have support from those above you.",e:"Jeg tør godt sige det, for jeg har rygdækning fra ledelsen.",t:"I dare say it because I have backing from management.",l:"B2",c:"Work & Meetings",k:"rygdækning"},
{d:"Køre noget i stilling",m:"To get something into position",x:"To prepare something carefully so it's ready to launch.",e:"Vi kører projektet i stilling, inden vi præsenterer det.",t:"We're getting the project into position before presenting it.",l:"C1",c:"Work & Meetings",k:"stilling"},
{d:"Sætte noget i søen",m:"To launch / set something in motion",x:"To start up a new initiative or project.",e:"De har sat et nyt uddannelsesprojekt i søen.",t:"They've launched a new training project.",l:"B2",c:"Work & Meetings",k:"søen"},
/* ===== FEELINGS & EMOTIONS ===== */
{d:"Have is i maven",m:"To keep one's cool",x:"To stay calm and composed under pressure.",e:"Peter har virkelig is i maven under stressende møder.",t:"Peter really keeps his cool during stressful meetings.",l:"B1",c:"Feelings & Emotions",k:"is"},
{d:"Slå koldt vand i blodet",m:"To calm down / not panic",x:"To stop worrying and react calmly.",e:"Slå nu koldt vand i blodet – det er ikke så slemt.",t:"Just calm down – it's not that bad.",l:"B2",c:"Feelings & Emotions",k:"koldt"},
{d:"Gå over gevind",m:"To go overboard / too far",x:"To lose control or do far more than reasonable.",e:"Han gik helt over gevind af glæde, da han vandt.",t:"He completely went overboard with joy when he won.",l:"B2",c:"Feelings & Emotions",k:"gevind"},
{d:"Have sommerfugle i maven",m:"To have butterflies in one's stomach",x:"To feel nervous excitement before something.",e:"Jeg har sommerfugle i maven før eksamen.",t:"I have butterflies in my stomach before the exam.",l:"B1",c:"Feelings & Emotions",k:"sommerfugle"},
{d:"Tage sig sammen",m:"To pull oneself together",x:"To gather one's strength and act despite difficulty.",e:"Nu må du tage dig sammen og komme i gang.",t:"Now you have to pull yourself together and get started.",l:"B1",c:"Feelings & Emotions",k:"sammen"},
{d:"Få kolde fødder",m:"To get cold feet",x:"To lose courage and back out at the last moment.",e:"Han fik kolde fødder og aflyste hele rejsen.",t:"He got cold feet and cancelled the whole trip.",l:"B1",c:"Feelings & Emotions",k:"fødder"},
{d:"Være helt ude af den",m:"To be beside oneself",x:"To be very upset or distressed.",e:"Hun var helt ude af den, da hunden blev væk.",t:"She was beside herself when the dog went missing.",l:"B2",c:"Feelings & Emotions",k:"ude"},
{d:"Bide i det sure æble",m:"To bite the bullet",x:"To accept something unpleasant that can't be avoided.",e:"Jeg må vist bide i det sure æble og ringe til tandlægen.",t:"I'd better bite the bullet and call the dentist.",l:"B2",c:"Feelings & Emotions",k:"æble"},
{d:"Få blod på tanden",m:"To get a taste for it",x:"To become eager and motivated after a first success.",e:"Efter den første sejr fik holdet blod på tanden.",t:"After the first win the team got a real taste for it.",l:"B2",c:"Feelings & Emotions",k:"blod"},

/* ===== RELATIONSHIPS ===== */
{d:"Komme på bølgelængde",m:"To be on the same wavelength",x:"To understand each other well and click.",e:"Vi kom hurtigt på bølgelængde og blev gode venner.",t:"We quickly got on the same wavelength and became good friends.",l:"B2",c:"Relationships",k:"bølgelængde"},
{d:"Stå på god fod med nogen",m:"To be on good terms with someone",x:"To have a friendly relationship with someone.",e:"Jeg står på god fod med mine naboer.",t:"I'm on good terms with my neighbours.",l:"B2",c:"Relationships",k:"fod"},
{d:"Holde hånden over nogen",m:"To protect / shield someone",x:"To support or cover for someone.",e:"Læreren holdt hånden over den nye elev.",t:"The teacher took the new pupil under her wing.",l:"B2",c:"Relationships",k:"hånden"},

{d:"Stikke hovederne sammen",m:"To put heads together",x:"To discuss something closely in a small group.",e:"Lad os stikke hovederne sammen og finde en løsning.",t:"Let's put our heads together and find a solution.",l:"B2",c:"Relationships",k:"hovederne"},

{d:"Ramme plet",m:"To hit the mark",x:"To say or do exactly the right thing.",e:"Med den gave ramte du virkelig plet.",t:"With that gift you really hit the mark.",l:"B1",c:"Relationships",k:"plet"},
{d:"Have en finger med i alt",m:"To meddle in everything",x:"To involve oneself in everyone's business.",e:"Tante Lis skal have en finger med i alt i familien.",t:"Aunt Lis has to meddle in everything in the family.",l:"B2",c:"Relationships",k:"alt"},

/* ===== DECISION MAKING ===== */
{d:"Springe ud i det",m:"To take the plunge",x:"To finally commit to something despite uncertainty.",e:"Efter lang tids tøven sprang de ud i det og købte huset.",t:"After much hesitation they took the plunge and bought the house.",l:"B1",c:"Decision Making",k:"ud"},
{d:"Sove på det",m:"To sleep on it",x:"To wait until the next day before deciding.",e:"Jeg vil lige sove på det, før jeg siger ja.",t:"I'll just sleep on it before I say yes.",l:"B1",c:"Decision Making",k:"sove"},
{d:"Smede mens jernet er varmt",m:"To strike while the iron is hot",x:"To act while the opportunity is good.",e:"Tilbuddet er godt nu, så lad os smede, mens jernet er varmt.",t:"The offer is good now, so let's strike while the iron is hot.",l:"B2",c:"Decision Making",k:"jernet"},

{d:"Veje sine ord",m:"To weigh one's words",x:"To choose what one says carefully.",e:"I sådan en sag må man veje sine ord.",t:"In a case like that you have to weigh your words.",l:"B2",c:"Decision Making",k:"ord"},

{d:"Trække en streg i sandet",m:"To draw a line in the sand",x:"To set a firm limit that won't be crossed.",e:"Nu trækker vi en streg i sandet – ikke mere overarbejde.",t:"Now we draw a line in the sand – no more overtime.",l:"B2",c:"Decision Making",k:"streg"},

{d:"Få vind i sejlene",m:"To get a tailwind / gain momentum",x:"To start succeeding and pick up speed.",e:"Efter den gode anmeldelse fik bandet vind i sejlene.",t:"After the good review the band got the wind in their sails.",l:"B2",c:"Success & Failure",k:"sejlene"},

{d:"Bide i græsset",m:"To bite the dust",x:"To fail badly or be defeated.",e:"Mange startups bider i græsset det første år.",t:"Many startups bite the dust in the first year.",l:"C1",c:"Success & Failure",k:"græsset"},

/* ===== TIME ===== */

/* ===== MONEY ===== */

/* ===== SOCIETY & NEWS ===== */
{d:"Stikke hovedet i busken",m:"To bury one's head in the sand",x:"To ignore a problem instead of facing it.",e:"Politikerne kan ikke bare stikke hovedet i busken.",t:"The politicians can't just bury their heads in the sand.",l:"B2",c:"Society & News",k:"busken"},

/* ============================================================
   STATE & PERSISTENCE
   ============================================================ */
const SAVE_KEY='idiomjaeger_v1';
const DEFAULT_STATE=()=>({idiom:{},totalAns:0,totalCorrect:0,streak:0,longest:0,coins:0,daily:{},ach:[],ctxWin:false,natWin:false});
let S=load();
function load(){
  try{const r=localStorage.getItem(SAVE_KEY);if(r)return Object.assign(DEFAULT_STATE(),JSON.parse(r));}catch(e){}
  return DEFAULT_STATE();
}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}}
function ist(id){if(!S.idiom[id])S.idiom[id]={box:0,seen:0,correct:0,wrong:0};return S.idiom[id];}
function isMastered(id){return ist(id).box>=4;}
function masteredCount(){return DATA.filter(d=>isMastered(d.id)).length;}
function accuracy(){return S.totalAns?Math.round(S.totalCorrect/S.totalAns*100):0;}
function todayKey(){return new Date().toISOString().slice(0,10);}

/* record an answer: updates SRS, stats, streak, coins, achievements */
function recordAnswer(id,correct){
  const st=ist(id);st.seen++;
  const wasMastered=st.box>=4;
  if(correct){st.correct++;st.box=Math.min(5,st.box+1);S.totalCorrect++;S.streak++;S.coins+=10;
    if(S.streak>S.longest)S.longest=S.streak;}
  else{st.wrong++;st.box=Math.max(0,st.box-1);S.streak=0;}
  S.totalAns++;
  const dk=todayKey();S.daily[dk]=(S.daily[dk]||0)+1;
  if(!wasMastered&&st.box>=4){newlyMastered(id);}
  checkAchievements();
  save();
}
let _justMastered=null;
function newlyMastered(id){_justMastered=id;}

/* ============================================================
   SRS / POOL HELPERS
   ============================================================ */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(arr,n){return shuffle(arr.slice()).slice(0,n);}
function weightOf(id){const st=S.idiom[id];if(!st||st.seen===0)return 4;return Math.max(1,6-st.box*1.2)+(st.wrong>st.correct?2:0);}
function pickWeighted(pool,exclude){
  const cand=pool.filter(d=>!exclude||!exclude.has(d.id));
  const src=cand.length?cand:pool;
  let total=0;const ws=src.map(d=>{const w=weightOf(d.id);total+=w;return w;});
  let r=Math.random()*total;
  for(let i=0;i<src.length;i++){r-=ws[i];if(r<=0)return src[i];}
  return src[src.length-1];
}
function weakIdioms(){return DATA.filter(d=>{const s=S.idiom[d.id];return s&&s.seen>0&&(s.box<=1||s.wrong>s.correct);});}
function strongIdioms(){return DATA.filter(d=>{const s=S.idiom[d.id];return s&&s.box>=4;});}

/* distractors */
function otherMeanings(idiom,pool,n){
  const opts=shuffle(DATA.filter(d=>d.id!==idiom.id&&d.m!==idiom.m));
  const pref=opts.filter(d=>d.c===idiom.c);const rest=opts.filter(d=>d.c!==idiom.c);
  return [...pref,...rest].slice(0,n).map(d=>d.m);
}
function otherIdioms(idiom,pool,n){
  const opts=shuffle(DATA.filter(d=>d.id!==idiom.id&&d.d!==idiom.d));
  const pref=opts.filter(d=>d.c===idiom.c);const rest=opts.filter(d=>d.c!==idiom.c);
  return [...pref,...rest].slice(0,n).map(d=>d.d);
}

/* ============================================================
   SPEECH SYNTHESIS (Danish)
   ============================================================ */
let voices=[];
function refreshVoices(){
  if(!('speechSynthesis' in window))return;
  voices=speechSynthesis.getVoices();
}
function danishVoice(){
  return voices.find(v=>/da(-|_)?DK/i.test(v.lang))||voices.find(v=>/^da/i.test(v.lang))||null;
}
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged=refreshVoices;
  refreshVoices();
}
function speak(text){
  if(!('speechSynthesis' in window)||!text)return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="da-DK";
    const v=danishVoice();
    if(v)u.voice=v;
    u.rate=0.95;
    speechSynthesis.speak(u);
  }catch(e){/* ignore */}
}
/* speaker button registry: since this file builds screens via innerHTML
   strings (not DOM nodes), buttons are rendered as markup carrying the
   idiom id + field, and a single delegated listener (bound in topbar
   re-renders) reads the text back out of DATA to call speak(). This avoids
   embedding raw Danish text inside onclick="" attributes (quote escaping). */
function speakerBtn(text,cls){
  const id='spk'+(_spkSeq++);
  _spkMap[id]=text;
  return `<button type="button" class="speaker ${cls||''}" data-spk="${id}" aria-label="Udtal" onclick="event.stopPropagation();speak(_spkMap['${id}'])">🔊</button>`;
}
let _spkSeq=0;
let _spkMap={};

let toastT;
function toast(msg){const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}
function burst(x,y,colors){colors=colors||['#f0c14b','#c8941f','#3f8f4a','#fff'];for(let i=0;i<14;i++){const p=document.createElement('div');p.className='particle';const ang=Math.random()*Math.PI*2,dist=40+Math.random()*70;p.style.cssText=`left:${x}px;top:${y}px;background:${colors[i%colors.length]};--dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px`;document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());}}
function burstAt(el){if(!el)return;const r=el.getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2);}

}
function bindFilters(cb){
  ['fCat','fLvl','fMast'].forEach(idn=>{const el=document.getElementById(idn);if(el)el.onchange=()=>{FILT.cat=document.getElementById('fCat').value;FILT.lvl=document.getElementById('fLvl').value;FILT.mast=document.getElementById('fMast').value;cb();};});
  const q=document.getElementById('fQ');if(q)q.oninput=()=>{FILT.q=q.value;cb();};
}
function applyFilter(){
  return DATA.filter(d=>{
    if(FILT.cat!=='all'&&d.c!==FILT.cat)return false;
    if(FILT.lvl!=='all'&&d.l!==FILT.lvl)return false;
    if(FILT.mast==='yes'&&!isMastered(d.id))return false;
    if(FILT.mast==='no'&&isMastered(d.id))return false;
    if(FILT.q){const s=FILT.q.toLowerCase();if(!(d.d.toLowerCase().includes(s)||d.m.toLowerCase().includes(s)))return false;}
    return true;
  });
}

   QUESTION BUILDERS (return {promptHTML, options:[{text,correct}], id})

function mcq(correctText,distractors){
  const opts=shuffle([{text:correctText,correct:true},...distractors.map(x=>({text:x,correct:false}))]);
  return opts;
}
function bIdiomMeaning(d){return{id:d.id,promptHTML:`<div>${esc(d.d)}${speakerBtn(d.d)}<span class="q-sub">Hvad betyder idiomet?</span></div>`,options:mcq(d.m,otherMeanings(d,null,3))};}
function bMeaningIdiom(d){return{id:d.id,promptHTML:`<div>"${esc(d.m)}"<span class="q-sub">Hvilket idiom passer?</span></div>`,options:mcq(d.d,otherIdioms(d,null,3))};}
function bExampleDetective(d){return{id:d.id,promptHTML:`<div style="font-size:1.05rem">🗣️ "${esc(d.e)}"${speakerBtn(d.e)}<span class="q-sub">Hvad betyder idiomet i sætningen?</span></div>`,options:mcq(d.m,otherMeanings(d,null,3))};}
function bContext(d){return{id:d.id,promptHTML:`<div style="font-size:1.02rem">Situation: <i>${esc(d.x)}</i><span class="q-sub">Hvilket dansk idiom passer bedst?</span></div>`,options:mcq(d.d,otherIdioms(d,null,3))};}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function blankWord(sentence,word){
  const re=new RegExp('(^|[^a-zA-ZæøåÆØÅ0-9])('+escRe(word)+')(?=[^a-zA-ZæøåÆØÅ0-9]|$)','i');
  if(re.test(sentence))return sentence.replace(re,(m,p1)=>p1+'_____');
  return null;
}
function lastWord(idiom){const parts=idiom.replace(/[.,!?]/g,'').trim().split(/\s+/);return parts[parts.length-1];}
function normTxt(s){return s.toLowerCase().replace(/[.,!?'"]/g,'').trim();}

/* ============================================================
   MCQ SESSION ENGINE
   ============================================================ */
let Q=null;
function startQuiz(cfg){
  Q={cfg,i:0,score:0,lives:cfg.lives||0,answered:false,timeLeft:cfg.timer||0,timerH:null,used:new Set()};
  if(cfg.timer){Q.timerH=setInterval(()=>{Q.timeLeft--;const t=document.getElementById('timerBig');if(t)t.textContent='⏱️ '+Q.timeLeft+'s';if(Q.timeLeft<=0)endQuiz();},1000);}
  nextQuestion();
}
function nextQuestion(){
  if(Q.cfg.total&&Q.i>=Q.cfg.total){return endQuiz();}
  const d=pickWeighted(Q.cfg.pool,Q.used);Q.used.add(d.id);if(Q.used.size>=Q.cfg.pool.length)Q.used.clear();
  Q.current=Q.cfg.build(d);Q.answered=false;
  renderQuestion();
}
function renderQuestion(){
  const c=Q.cfg,q=Q.current;
  const total=c.total?` / ${c.total}`:'';
  const lives=c.lives?`<span class="lives">${'❤️'.repeat(Q.lives)}${'🖤'.repeat(Math.max(0,(c.lives)-Q.lives))}</span>`:'';
  const timer=c.timer?`<div class="timer-big" id="timerBig">⏱️ ${Q.timeLeft}s</div>`:'';
  app.innerHTML=`<div class="panel">${topbar()}
    <h2 class="section-title">${c.ico} ${c.title}</h2>
    <div class="row between progress-line"><span>Spørgsmål ${Q.i+1}${total}</span><span>Point: <b>${Q.score}</b></span>${lives?'<span>'+lives+'</span>':''}</div>
    ${timer}
    <div class="q-prompt">${q.promptHTML}</div>
    <div class="choices" id="choices">${q.options.map((o,idx)=>`<button class="btn choice" data-i="${idx}">${String.fromCharCode(65+idx)}) ${esc(o.text)}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div><div id="explainSlot"></div>
    <div class="center mt hidden" id="nextWrap"><button class="btn primary" id="nextBtn">Næste ⟶</button></div>
  </div>`;
  document.querySelectorAll('#choices .choice').forEach(b=>b.onclick=()=>answer(parseInt(b.dataset.i),b));
  const nb=document.getElementById('nextBtn');if(nb)nb.onclick=()=>{Q.i++;nextQuestion();};
}
function answer(idx,btn){
  if(Q.answered)return;Q.answered=true;
  const q=Q.current,opt=q.options[idx],d=DATA[q.id];
  const correct=opt.correct;
  document.querySelectorAll('#choices .choice').forEach((b,i)=>{b.disabled=true;if(q.options[i].correct)b.classList.add('correct');else if(i===idx)b.classList.add('wrong');});
  recordAnswer(q.id,correct);
  const fb=document.getElementById('fb');
  if(correct){fb.textContent=motivate()+' 🪙 +10';fb.className='feedback good';burstAt(btn);}
  else{fb.textContent='Ikke helt — '+esc(d.d);fb.className='feedback bad';}
  if(_justMastered===q.id){toast('🏆 Skat låst op! "'+esc(d.d)+'" mestret!');_justMastered=null;}
  document.getElementById('explainSlot').innerHTML=`<div class="explain"><b>${esc(d.d)}</b>${speakerBtn(d.d)} — ${esc(d.m)}<br>${esc(d.x)}<br><i>"${esc(d.e)}"</i>${speakerBtn(d.e)} → ${esc(d.t)}</div>`;
  if(correct)Q.score++;
  if(Q.cfg.lives){if(!correct){Q.lives--;if(Q.lives<=0){document.getElementById('nextWrap').classList.remove('hidden');document.getElementById('nextBtn').textContent='Se resultat ⟶';document.getElementById('nextBtn').onclick=endQuiz;return;}}}
  document.getElementById('nextWrap').classList.remove('hidden');
}
function endQuiz(){
  if(Q.timerH)clearInterval(Q.timerH);
  const c=Q.cfg;const answered=Q.cfg.timer?Q.i:(Q.i+(Q.answered?1:0));
  const total=c.total||answered||1;
  const pct=Math.round(Q.score/(c.timer?Math.max(1,Q.answered?Q.i+1:Q.i):total)*100);
  if(c.onEnd)c.onEnd(Q.score,total,pct);
  let msg=pct>=80?'Native-niveau forståelse! 🎓':pct>=50?'Godt jaget! 🏴‍☠️':'Bliv ved med at jage! 💪';
  app.innerHTML=`<div class="panel center">${topbar()}
    <h2 class="section-title">${c.ico} Runde slut</h2>
    <div style="font-size:3rem">🏆</div>
    <div class="stat-box" style="max-width:240px;margin:10px auto"><div class="num">${Q.score}</div><div class="lbl">rigtige svar${c.timer?' på 60s':''}</div></div>
    <p style="font-size:1.1rem"><b>${msg}</b></p>
    <p class="progress-line">Nøjagtighed: ${accuracy()}% · Guld: 💰 ${S.coins}</p>
    <div class="row" style="justify-content:center"><button class="btn primary" onclick="launchGame('${c.gid}')">Spil igen 🔁</button><button class="btn" onclick="renderGames()">Andre spil</button><button class="btn ghost" onclick="goMenu()">Menu</button></div>
  </div>`;
}

/* ============================================================
   TEXT-INPUT SESSION (Fill Missing / Complete Expression)
   ============================================================ */
let T=null;
function startText(cfg){
  // pre-filter pool to items that can be blanked
  const pool=cfg.pool.filter(cfg.canUse);
  T={cfg:Object.assign({},cfg,{pool}),i:0,score:0,used:new Set()};
  nextText();
}
function nextText(){
  if(T.i>=T.cfg.total){return endText();}
  const d=pickWeighted(T.cfg.pool,T.used);T.used.add(d.id);if(T.used.size>=T.cfg.pool.length)T.used.clear();
  T.current=T.cfg.make(d);renderText();
}
function renderText(){
  const c=T.cfg,q=T.current;
  app.innerHTML=`<div class="panel">${topbar()}
    <h2 class="section-title">${c.ico} ${c.title}</h2>
    <div class="row between progress-line"><span>Spørgsmål ${T.i+1} / ${c.total}</span><span>Point: <b>${T.score}</b></span></div>
    <div class="q-prompt">${q.promptHTML}</div>
    <div class="text-input-row"><input type="text" id="txtIn" placeholder="Skriv det manglende ord..." autocomplete="off"><button class="btn primary" id="txtGo">Svar</button></div>
    <div class="feedback" id="fb"></div><div id="explainSlot"></div>
    <div class="center mt hidden" id="nextWrap"><button class="btn primary" id="nextBtn">Næste ⟶</button></div>
  </div>`;
  const inp=document.getElementById('txtIn');inp.focus();
  const go=()=>checkText();
  document.getElementById('txtGo').onclick=go;
  inp.onkeydown=e=>{if(e.key==='Enter')go();};
  document.getElementById('nextBtn').onclick=()=>{T.i++;nextText();};
}
function checkText(){
  if(T.answered)return;
  const q=T.current,d=DATA[q.id];const val=normTxt(document.getElementById('txtIn').value);
  if(!val)return;
  T.answered=true;
  const correct=val===normTxt(q.answer);
  recordAnswer(q.id,correct);
  document.getElementById('txtIn').disabled=true;document.getElementById('txtGo').disabled=true;
  const fb=document.getElementById('fb');
  if(correct){fb.textContent=motivate()+' 🪙 +10';fb.className='feedback good';burstAt(document.getElementById('txtGo'));T.score++;}
  else{fb.textContent='Det rigtige ord var: "'+esc(q.answer)+'"';fb.className='feedback bad';}
  if(_justMastered===q.id){toast('🏆 Skat låst op! "'+esc(d.d)+'" mestret!');_justMastered=null;}
  document.getElementById('explainSlot').innerHTML=`<div class="explain"><b>${esc(d.d)}</b>${speakerBtn(d.d)} — ${esc(d.m)}<br><i>"${esc(d.e)}"</i>${speakerBtn(d.e)} → ${esc(d.t)}</div>`;
  document.getElementById('nextWrap').classList.remove('hidden');
  T.answered=false;
}
function endText(){
  const c=T.cfg,pct=Math.round(T.score/c.total*100);
  let msg=pct>=80?'Native-niveau! 🎓':pct>=50?'Godt klaret! 🏴‍☠️':'Bliv ved! 💪';
  app.innerHTML=`<div class="panel center">${topbar()}<h2 class="section-title">${c.ico} Runde slut</h2>
    <div style="font-size:3rem">🏆</div>
    <div class="stat-box" style="max-width:240px;margin:10px auto"><div class="num">${T.score}/${c.total}</div><div class="lbl">rigtige</div></div>
    <p><b>${msg}</b></p>
    <div class="row" style="justify-content:center"><button class="btn primary" onclick="launchGame('${c.gid}')">Spil igen 🔁</button><button class="btn ghost" onclick="renderGames()">Andre spil</button></div></div>`;
}

/* ============================================================
   MEMORY CARDS
   ============================================================ */
let MEM=null;
function startMemory(pool){
  const picks=sample(pool,6);
  let cards=[];picks.forEach(d=>{cards.push({pid:d.id,kind:'d',text:d.d});cards.push({pid:d.id,kind:'m',text:d.m});});
  shuffle(cards);
  MEM={cards,flipped:[],matched:0,moves:0,pool};
  renderMemory();
}
function renderMemory(){
  app.innerHTML=`<div class="panel">${topbar()}
    <h2 class="section-title">🃏 Idiom Memory</h2>
    <div class="progress-line">Par fundet: <b>${MEM.matched}</b>/6 · Træk: ${MEM.moves}</div>
    <div class="mem-grid" id="memGrid">
      ${MEM.cards.map((c,i)=>`<div class="mem-card${c.matched?' matched':''}${MEM.flipped.includes(i)?' flipped':''}" data-i="${i}"><span class="back">⚜️</span><span class="face">${esc(c.text)}${c.kind==='d'?speakerBtn(c.text,'small'):''}</span></div>`).join('')}
    </div>
    <div class="scrollnote">Vend to kort og find idiom + betydning.</div></div>`;
  document.querySelectorAll('#memGrid .mem-card').forEach(el=>el.onclick=()=>memFlip(parseInt(el.dataset.i)));
}
function memFlip(i){
  const c=MEM.cards[i];
  if(c.matched||MEM.flipped.includes(i)||MEM.flipped.length>=2)return;
  MEM.flipped.push(i);renderMemory();
  if(MEM.flipped.length===2){
    MEM.moves++;
    const[a,b]=MEM.flipped;const ca=MEM.cards[a],cb=MEM.cards[b];
    if(ca.pid===cb.pid&&ca.kind!==cb.kind){
      ca.matched=cb.matched=true;MEM.matched++;MEM.flipped=[];
      recordAnswer(ca.pid,true);
      const burstCard=document.querySelector(`.mem-card[data-i="${a}"]`);burstAt(burstCard);
      if(_justMastered===ca.pid){toast('🏆 "'+esc(DATA[ca.pid].d)+'" mestret!');_justMastered=null;}
      setTimeout(()=>{if(MEM.matched>=6)endMemory();else renderMemory();},450);
    }else{
      setTimeout(()=>{MEM.flipped=[];renderMemory();},850);
    }
  }
}
function endMemory(){
  app.innerHTML=`<div class="panel center">${topbar()}<h2 class="section-title">🃏 Færdig!</h2>
  <div style="font-size:3rem">🎉</div><p><b>Alle par fundet på ${MEM.moves} træk!</b></p>
  <div class="row" style="justify-content:center"><button class="btn primary" onclick="launchGame('memory')">Igen 🔁</button><button class="btn ghost" onclick="renderGames()">Andre spil</button></div></div>`;
}

   MATCH PAIRS
   ============================================================ */
let MP=null;
function startMatch(pool){
  const picks=sample(pool,5);
  MP={picks,left:shuffle(picks.slice()),right:shuffle(picks.slice()),selL:null,done:0};
  renderMatch();
}
function renderMatch(){
  app.innerHTML=`<div class="panel">${topbar()}
    <h2 class="section-title">🔗 Match Pairs</h2>
    <div class="progress-line">Forbundet: <b>${MP.done}</b>/5 — tryk et idiom og dets betydning</div>
    <div class="match-cols">
      <div class="match-col" id="colL">${MP.left.map(d=>`<div class="match-item" data-id="${d.id}" data-side="L">${esc(d.d)}${speakerBtn(d.d,'small')}</div>`).join('')}</div>
      <div class="match-col" id="colR">${MP.right.map(d=>`<div class="match-item" data-id="${d.id}" data-side="R">${esc(d.m)}</div>`).join('')}</div>
    </div></div>`;
  document.querySelectorAll('.match-item').forEach(el=>el.onclick=()=>matchClick(el));
}
function matchClick(el){
  if(el.classList.contains('done'))return;
  const side=el.dataset.side,id=parseInt(el.dataset.id);
  if(side==='L'){document.querySelectorAll('#colL .match-item').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');MP.selL=id;return;}
  if(MP.selL===null)return;
  if(id===MP.selL){
    document.querySelectorAll(`.match-item[data-id="${id}"]`).forEach(x=>{x.classList.add('done');x.classList.remove('sel');});
    recordAnswer(id,true);MP.done++;burstAt(el);
    if(_justMastered===id){toast('🏆 "'+esc(DATA[id].d)+'" mestret!');_justMastered=null;}
    MP.selL=null;
    if(MP.done>=5)setTimeout(endMatch,400);
  }else{
    recordAnswer(MP.selL,false);
    el.classList.add('miss');setTimeout(()=>el.classList.remove('miss'),400);
    document.querySelectorAll('#colL .match-item').forEach(x=>x.classList.remove('sel'));MP.selL=null;
  }
}
function endMatch(){
  app.innerHTML=`<div class="panel center">${topbar()}<h2 class="section-title">🔗 Færdig!</h2>
  <div style="font-size:3rem">🎉</div><p><b>Alle par forbundet!</b></p>

/* ============================================================
   LAUNCH DISPATCHER
   ============================================================ */
function mixedBuild(d){const fns=[bIdiomMeaning,bMeaningIdiom,bExampleDetective,bContext];return fns[Math.floor(Math.random()*fns.length)](d);}
function launchGame(id){
  switch(id){
    case'idiomHunter':return startQuiz({gid:id,ico:'🏹',title:'Idiom Hunter',pool:levelPool(),build:bIdiomMeaning,total:10});
    case'meaningHunter':return startQuiz({gid:id,ico:'🎣',title:'Meaning Hunter',pool:levelPool(),build:bMeaningIdiom,total:10});
    case'exampleDetective':return startQuiz({gid:id,ico:'🕵️',title:'Example Detective',pool:levelPool(),build:bExampleDetective,total:10});
    case'fillMissing':return startText({gid:id,ico:'✏️',title:'Fill the Missing',pool:levelPool(),total:8,
      canUse:d=>!!blankWord(d.e,d.k),
      make:d=>({id:d.id,answer:d.k,promptHTML:`<div style="font-size:1.05rem">${esc(blankWord(d.e,d.k))}<span class="q-sub">Udfyld det manglende ord (${d.m})</span></div>`})});
    case'complete':return startText({gid:id,ico:'🧩',title:'Complete the Expression',pool:levelPool(),total:8,
      canUse:d=>d.d.trim().split(/\s+/).length>=2,
      make:d=>{const w=lastWord(d.d);const shown=d.d.replace(new RegExp(escRe(w)+'\\s*$'),'_____');return{id:d.id,answer:w,promptHTML:`<div>${esc(shown)}<span class="q-sub">Fuldfør udtrykket — betyder: ${esc(d.m)}</span></div>`};}});
    case'memory':return startMemory(levelPool());
    case'match':return startMatch(levelPool());
    case'category':return renderCategoryPick();
    case'timed':return startQuiz({gid:id,ico:'⏱️',title:'Timed Hunt',pool:levelPool(),build:bIdiomMeaning,timer:60});
    case'survival':return startQuiz({gid:id,ico:'💀',title:'Idiom Survival',pool:levelPool(),build:bIdiomMeaning,lives:3});
    case'context':return startQuiz({gid:id,ico:'🎯',title:'Context Master',pool:levelPool(),build:bContext,total:10,onEnd:(s,t,p)=>{if(p>=70){S.ctxWin=true;checkAchievements();save();}}});
    case'native':{const pool=levelPool().filter(d=>d.l==='B2'||d.l==='C1');return startQuiz({gid:id,ico:'🎓',title:'Native Speaker',pool,build:bIdiomMeaning,total:10,onEnd:(s,t,p)=>{if(p>=70){S.natWin=true;checkAchievements();save();}}});}
    case'mixed':return startQuiz({gid:id,ico:'🌀',title:'Mixed Review',pool:levelPool(),build:mixedBuild,total:12});
  }
}
function startPractice(){startQuiz({gid:'mixed',ico:'⚔️',title:'Øve-tilstand',pool:levelPool(),build:mixedBuild,total:12});}
function startWeak(){
  const pool=weakIdioms();
  if(pool.length<4){toast('Spil lidt mere først — så finder vi dine svage idiomer! 🔁');return;}
  startQuiz({gid:'mixed',ico:'🔁',title:'Svage Idiomer',pool,build:bIdiomMeaning,total:Math.min(10,pool.length)});
}

/* ============================================================
   STATISTICS
   ============================================================ */
function renderStats(){
  const seen=Object.values(S.idiom).filter(s=>s.seen>0).length;
  const weak=DATA.map(d=>({d,s:S.idiom[d.id]})).filter(o=>o.s&&o.s.seen>=2).sort((a,b)=>(a.s.correct/Math.max(1,a.s.seen))-(b.s.correct/Math.max(1,b.s.seen)));
  const weakest=weak.slice(0,5),strongest=weak.slice().reverse().filter(o=>o.s.correct>0).slice(0,5);
  const catBars=CATS.map(c=>{const items=DATA.filter(d=>d.c===c);const m=items.filter(d=>isMastered(d.id)).length;return{name:c,pct:Math.round(m/items.length*100),m,n:items.length};});
  const lvls=['A2','B1','B2','C1'].map(l=>{const items=DATA.filter(d=>d.l===l);const m=items.filter(d=>isMastered(d.id)).length;return{name:l,pct:items.length?Math.round(m/items.length*100):0,m,n:items.length};});
  const today=S.daily[todayKey()]||0;
  app.innerHTML=`<div class="panel">${topbar()}
    <h2 class="section-title">📊 Statistik</h2>
    <div class="stat-grid">
      <div class="stat-box"><div class="num">${masteredCount()}</div><div class="lbl">Idiomer lært</div></div>
      <div class="stat-box"><div class="num">${accuracy()}%</div><div class="lbl">Nøjagtighed</div></div>
      <div class="stat-box"><div class="num">${S.streak}</div><div class="lbl">Stime nu</div></div>
      <div class="stat-box"><div class="num">${S.longest}</div><div class="lbl">Længste stime</div></div>
      <div class="stat-box"><div class="num">${seen}</div><div class="lbl">Mødt mindst 1x</div></div>
      <div class="stat-box"><div class="num">${today}</div><div class="lbl">Svar i dag</div></div>
    </div>
    <h3 style="margin:14px 0 6px">Kategori-mestring</h3>
    ${catBars.map(b=>`<div class="bar-row"><span class="name">${CAT_ICON[b.name]} ${b.name}</span><span class="bar-track"><span class="bar-val" style="width:${b.pct}%"></span></span><span class="pct">${b.pct}%</span></div>`).join('')}
    <h3 style="margin:14px 0 6px">Niveau-mestring</h3>
    ${lvls.map(b=>`<div class="bar-row"><span class="name">${lvlBadge(b.name)} ${b.m}/${b.n}</span><span class="bar-track"><span class="bar-val" style="width:${b.pct}%"></span></span><span class="pct">${b.pct}%</span></div>`).join('')}
    <h3 style="margin:14px 0 6px">🪙 Svageste idiomer</h3>
    ${weakest.length?weakest.map(o=>`<div style="font-size:.85rem;margin:3px 0">• <b>${esc(o.d.d)}</b> — ${Math.round(o.s.correct/o.s.seen*100)}% (${o.s.correct}/${o.s.seen})</div>`).join(''):'<div class="empty">Spil mere for at se data.</div>'}
    <h3 style="margin:14px 0 6px">⭐ Stærkeste idiomer</h3>
    ${strongest.length?strongest.map(o=>`<div style="font-size:.85rem;margin:3px 0">• <b>${esc(o.d.d)}</b> — ${Math.round(o.s.correct/o.s.seen*100)}%</div>`).join(''):'<div class="empty">Spil mere for at se data.</div>'}
    <div class="center mt"><button class="btn small ghost" onclick="resetProgress()">Nulstil fremgang</button></div>
  </div>`;
}
function resetProgress(){if(confirm('Nulstil al fremgang, guld og badges?')){S=DEFAULT_STATE();save();toast('Fremgang nulstillet.');goMenu();}}

/* ============================================================
   ACHIEVEMENTS VIEW
   ============================================================ */
function renderAch(){
  app.innerHTML=`<div class="panel">${topbar()}<h2 class="section-title">🏆 Badges & Skatte</h2>
  <div class="progress-line">${S.ach.length} af ${ACHS.length} låst op</div>
  <div class="badge-grid">${ACHS.map(a=>{const un=S.ach.includes(a.id);return`<div class="badge${un?' un':''}"><span class="ico">${a.ico}</span><span><span class="t">${a.t} ${un?'✓':''}</span><br><span class="d">${a.d}</span></span></div>`;}).join('')}</div></div>`;
}

/* ============================================================
   INIT
   ============================================================ */
renderMenu();
</script>
</body>
